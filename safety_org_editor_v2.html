<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안전관리 조직도 | Safety Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>

/* ══ PORTAL NAV ══ */
#portal-nav{
  position:relative;z-index:300;
  background:rgba(15,17,23,.96);
  backdrop-filter:blur(16px);
  border-bottom:1px solid #2c3347;
  padding:0 20px;
  display:flex;align-items:center;
  height:48px;gap:14px;
  flex-shrink:0;
}
.pnav-logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;letter-spacing:.1em;
  color:#f97316;
  display:flex;align-items:center;gap:7px;
  text-decoration:none;
  flex-shrink:0;
}
.pnav-logo span{color:#f1f5f9;}
.pnav-sep{width:1px;height:20px;background:#2c3347;flex-shrink:0;}
.pnav-title{font-size:13px;font-weight:600;color:#94a3b8;}
.pnav-links{display:flex;align-items:center;gap:6px;margin-left:auto;}
.pnav-link{
  font-size:12px;font-weight:500;color:#64748b;
  padding:5px 10px;border-radius:6px;
  text-decoration:none;transition:all .15s;
  border:1px solid transparent;
}
.pnav-link:hover{color:#f1f5f9;background:rgba(255,255,255,.06);border-color:#2c3347;}
.pnav-link.active{color:#f97316;border-color:rgba(249,115,22,.3);background:rgba(249,115,22,.08);}

:root{
  --navy:#0a1628;--blue:#1d6fa4;--blue-lt:#e8f4fb;--blue-bd:#7ec8e3;
  --green:#2a7d4f;--green-lt:#e8f6ef;--green-bd:#6ecf9a;
  --red:#c0392b;--red-lt:#fdecea;--red-bd:#e74c3c;
  --gray:#64748b;--border:#cbd5e1;--bg:#dde4ed;
  --sel:#3b82f6;--conn:#94a3b8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--navy);
  overflow:hidden;height:100vh;display:flex;flex-direction:column;}

/* ── TOOLBAR ── */
#toolbar{
  flex-shrink:0;background:var(--navy);
  display:flex;align-items:center;gap:5px;padding:7px 12px;
  box-shadow:0 2px 12px rgba(0,0,0,.3);z-index:200;flex-wrap:wrap;
}
.tb-logo{color:#fff;font-size:13px;font-weight:900;margin-right:4px;white-space:nowrap;}
.tb-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  color:#fff;font-size:11px;font-weight:600;padding:5px 10px;
  border-radius:5px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;
  transition:background .12s;
}
.tb-btn:hover{background:rgba(255,255,255,.22);}
.tb-btn.act{background:var(--sel);border-color:var(--sel);}
.tb-btn.red{background:rgba(220,50,50,.25);border-color:rgba(220,50,50,.4);}
.tb-btn.red.ready{background:rgba(220,50,50,.55);border-color:rgba(220,50,50,.8);animation:pulse .8s infinite alternate;}
@keyframes pulse{from{opacity:.8}to{opacity:1}}
.tb-btn.red:hover{background:rgba(220,50,50,.45);}
.tb-btn.grn{background:rgba(40,180,100,.25);border-color:rgba(40,180,100,.4);}
.tb-btn.grn:hover{background:rgba(40,180,100,.45);}
.tb-sep{width:1px;height:22px;background:rgba(255,255,255,.15);margin:0 2px;}
.tb-hint{color:rgba(255,255,255,.4);font-size:10px;margin-left:auto;}

/* ── LAYOUT ── */
#main{flex:1;display:flex;overflow:hidden;position:relative;}

/* ── SCROLLABLE WRAPPER ── */
#wrapper{
  flex:1;overflow:auto;
  background:var(--bg);
  background-image:radial-gradient(#8fa3bc 1px,transparent 1px);
  background-size:6px 6px;
}

/* ── CANVAS ── */
#canvas{position:relative;width:2100px;height:1100px;user-select:none;}

/* ── SVG LAYER ── */
#svg-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}

/* ── BOX ── */
.box{
  position:absolute;border-radius:7px;cursor:move;z-index:10;
  min-width:90px;min-height:55px;
}
.box-body{
  width:100%;height:100%;border-radius:7px;
  padding:8px 12px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden;
  pointer-events:none;
}
.b-role{font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;opacity:.72;margin-bottom:2px;}
.b-name{font-size:12px;font-weight:700;line-height:1.3;word-break:keep-all;}
.b-contact{font-size:9px;margin-top:3px;opacity:.82;}
.b-contact::before{content:"";display:none;}

/* selection ring */
.box.sel .box-body{outline:2.5px solid var(--sel);outline-offset:-1px;border-radius:7px;}

/* ── THEMES ── */
.t-navy    {background:#0a1628;color:#fff;}
.t-pm      {background:#1d6fa4;color:#fff;outline:3px solid #1a5f8a;outline-offset:-3px;}
.t-prime   {background:#1d6fa4;color:#fff;}
.t-prime-lt{background:#e8f4fb;color:#1d6fa4;outline:1.5px solid #7ec8e3;outline-offset:-1.5px;}
.t-safety  {background:#c0392b;color:#fff;}
.t-sflt    {background:#fdecea;color:#c0392b;outline:1.5px solid #e74c3c;outline-offset:-1.5px;}
.t-sm      {background:#2a7d4f;color:#fff;outline:3px solid #1e6040;outline-offset:-3px;}
.t-sub     {background:#2a7d4f;color:#fff;}
.t-sub-lt  {background:#e8f6ef;color:#2a7d4f;outline:1.5px solid #6ecf9a;outline-offset:-1.5px;}
.t-subdark {background:#1e6040;color:#fff;}
.t-gray    {background:#64748b;color:#fff;}
.t-white   {background:#fff;color:#0a1628;outline:1.5px solid #cbd5e1;outline-offset:-1.5px;}

.t-sky      {background:#0ea5e9;color:#fff;}
.t-sky-lt   {background:#e0f2fe;color:#0369a1;outline:1.5px solid #7dd3fc;outline-offset:-1.5px;}
.t-indigo   {background:#4f46e5;color:#fff;}
.t-indigo-lt{background:#ede9fe;color:#4338ca;outline:1.5px solid #a5b4fc;outline-offset:-1.5px;}
.t-teal     {background:#0d9488;color:#fff;}
.t-teal-lt  {background:#ccfbf1;color:#0f766e;outline:1.5px solid #5eead4;outline-offset:-1.5px;}
.t-lime     {background:#65a30d;color:#fff;}
.t-lime-lt  {background:#ecfccb;color:#3f6212;outline:1.5px solid #a3e635;outline-offset:-1.5px;}
.t-orange   {background:#ea580c;color:#fff;}
.t-orange-lt{background:#fff7ed;color:#c2410c;outline:1.5px solid #fdba74;outline-offset:-1.5px;}
.t-amber    {background:#d97706;color:#fff;}
.t-amber-lt {background:#fffbeb;color:#b45309;outline:1.5px solid #fcd34d;outline-offset:-1.5px;}
.t-slate    {background:#475569;color:#fff;}
.t-zinc     {background:#52525b;color:#fff;}
.t-light    {background:#f1f5f9;color:#334155;outline:1.5px solid #cbd5e1;outline-offset:-1.5px;}
.t-purple   {background:#7c3aed;color:#fff;}
.t-purple-lt{background:#f5f3ff;color:#6d28d9;outline:1.5px solid #c4b5fd;outline-offset:-1.5px;}
.t-pink     {background:#db2777;color:#fff;}
.t-pink-lt  {background:#fdf2f8;color:#be185d;outline:1.5px solid #f9a8d4;outline-offset:-1.5px;}
.t-rose     {background:#e11d48;color:#fff;}
.t-rose-lt  {background:#fff1f2;color:#be123c;outline:1.5px solid #fda4af;outline-offset:-1.5px;}
.t-gold     {background:#b45309;color:#fff;}
.t-gold-lt  {background:#fffbeb;color:#92400e;outline:1.5px solid #fcd34d;outline-offset:-1.5px;}
.t-brown    {background:#78350f;color:#fff;}
.t-cyan     {background:#0891b2;color:#fff;}
.t-cyan-lt  {background:#ecfeff;color:#0e7490;outline:1.5px solid #67e8f9;outline-offset:-1.5px;}


/* ── PORTS ── */
.port{
  position:absolute;width:16px;height:16px;border-radius:50%;
  background:#fff;border:2.5px solid var(--sel);
  opacity:0;z-index:50;cursor:crosshair;pointer-events:none;
  transition:opacity .12s,transform .1s;box-shadow:0 0 0 3px rgba(59,130,246,.15);
}
.port-t{top:-8px; left:50%;transform:translateX(-50%);}
.port-b{bottom:-8px;left:50%;transform:translateX(-50%);}
.port-l{left:-8px; top:50%;transform:translateY(-50%);}
.port-r{right:-8px;top:50%;transform:translateY(-50%);}
/* connect-mode: show ports */
body.cm .port{opacity:.5;pointer-events:all;}
body.cm .box:hover .port{opacity:1;transform:translateX(-50%) scale(1.25);}
body.cm .box:hover .port-l,body.cm .box:hover .port-r{transform:translateY(-50%) scale(1.25);}
body.cm .port:hover{opacity:1;background:var(--sel);transform:translateX(-50%) scale(1.5);}
body.cm .port-l:hover,body.cm .port-r:hover{background:var(--sel);transform:translateY(-50%) scale(1.5);}
body.cm .port.active{opacity:1;background:var(--sel);box-shadow:0 0 0 4px rgba(59,130,246,.35);}

/* ── RESIZE HANDLES ── */
.rh{
  position:absolute;width:9px;height:9px;background:#fff;
  border:1.5px solid var(--sel);border-radius:2px;z-index:25;
  opacity:0;pointer-events:none;
}
.box.sel .rh{opacity:1;pointer-events:all;}
.rh-nw{top:-4px;left:-4px;cursor:nw-resize;}
.rh-n {top:-4px;left:50%;transform:translateX(-50%);cursor:n-resize;}
.rh-ne{top:-4px;right:-4px;cursor:ne-resize;}
.rh-e {right:-4px;top:50%;transform:translateY(-50%);cursor:e-resize;}
.rh-se{bottom:-4px;right:-4px;cursor:se-resize;}
.rh-s {bottom:-4px;left:50%;transform:translateX(-50%);cursor:s-resize;}
.rh-sw{bottom:-4px;left:-4px;cursor:sw-resize;}
.rh-w {left:-4px;top:50%;transform:translateY(-50%);cursor:w-resize;}

/* ── CONNECTIONS ── */
.cp{fill:none;stroke:#94a3b8;stroke-width:2.2;stroke-linejoin:round;
   stroke-linecap:round;pointer-events:none;transition:stroke .12s;}
.cp.sel{stroke:#3b82f6;}
.ch{fill:none;stroke:transparent;stroke-width:14;cursor:pointer;pointer-events:stroke;}
.ct{fill:none;stroke:#3b82f6;stroke-width:1.8;stroke-dasharray:5 4;pointer-events:none;}

/* ── EDIT PANEL ── */
#ep{
  width:268px;flex-shrink:0;background:#fff;
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  box-shadow:-3px 0 14px rgba(0,0,0,.07);z-index:50;
}
.ep-hdr{background:var(--navy);color:#fff;padding:11px 14px;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.ep-hdr h3{font-size:12px;font-weight:700;}
.ep-body{flex:1;overflow-y:auto;padding:14px;}
.ep-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:8px;color:var(--gray);font-size:11px;text-align:center;padding:20px;}
.ep-empty .ico{font-size:28px;opacity:.35;}
.ep-sec{margin-bottom:14px;}
.ep-sec h4{font-size:9px;font-weight:700;color:#94a3b8;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:6px;}
.ep-f{margin-bottom:7px;}
.ep-f label{display:block;font-size:10px;font-weight:700;color:var(--navy);margin-bottom:3px;}
.ep-f input,.ep-f select{
  width:100%;border:1.5px solid var(--border);border-radius:5px;
  padding:6px 9px;font-size:11px;font-family:'Noto Sans KR',sans-serif;
  color:var(--navy);background:#f8fafc;transition:border .12s;}
.ep-f input:focus,.ep-f select:focus{outline:none;border-color:var(--blue);background:#fff;}
.ep-f input[type=number]{-moz-appearance:textfield;}
.swatches{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:4px;}
.sw{width:26px;height:26px;border-radius:4px;cursor:pointer;border:2px solid transparent;
  transition:transform .1s,border .1s;flex-shrink:0;}
.sw:hover{transform:scale(1.2);}
.sw.act{border-color:var(--sel) !important;transform:scale(1.2);}
.ep-div{border:none;border-top:1px solid var(--border);margin:10px 0;}
.ep-ft{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;}
.ep-btn{flex:1;padding:7px;border-radius:5px;border:none;cursor:pointer;
  font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;transition:opacity .12s;}
.ep-btn:hover{opacity:.83;}
.ep-apply{background:var(--blue);color:#fff;}
.ep-del{background:#fee2e2;color:var(--red);}




/* ── FORMAT BUTTONS ── */
.fmt-btn{
  width:28px;height:28px;border-radius:5px;border:1.5px solid var(--border);
  background:#f8fafc;color:var(--navy);font-size:12px;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  transition:all .12s;font-family:'Noto Sans KR',sans-serif;
}
.fmt-btn:hover{background:#e2e8f0;}
.fmt-btn.fmt-act{background:var(--blue);color:#fff;border-color:var(--blue);}


/* ── DIVIDERS ── */
.divider{
  position:absolute;z-index:8;cursor:move;
  pointer-events:all;
}

/* ─ HORIZONTAL ─ */
.divider.dh{
  display:flex;flex-direction:column;
  min-height:32px;
}
.dh-body{
  position:relative;
  height:32px;
  display:flex;align-items:center;
  border-radius:6px;
  overflow:hidden;
  pointer-events:none;
  box-shadow:0 2px 8px rgba(0,0,0,.18);
}
/* diagonal stripe overlay */
.dh-body::before{
  content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(
    -45deg,
    transparent,transparent 6px,
    rgba(255,255,255,.10) 6px,rgba(255,255,255,.10) 9px
  );
  pointer-events:none;
}
/* left solid accent bar */
.dh-body::after{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:5px;background:rgba(255,255,255,.35);
  pointer-events:none;
}
.dh-label-pill{
  position:relative;z-index:2;
  display:inline-flex;align-items:center;gap:5px;
  margin:0 12px;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.28);
  border-radius:20px;
  padding:3px 12px;
  font-size:11px;font-weight:800;letter-spacing:.1em;
  color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4);
  white-space:nowrap;
  pointer-events:none;
}
.dh-label-pill .div-icon{font-size:10px;}
/* right cap diamond */
.dh-cap{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:10px;height:10px;background:rgba(255,255,255,.4);
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  pointer-events:none;
}

/* ─ VERTICAL ─ */
.divider.dv{
  display:flex;flex-direction:row;
  min-width:32px;
}
.dv-body{
  position:relative;
  width:32px;
  display:flex;align-items:center;justify-content:center;
  border-radius:6px;
  overflow:hidden;
  pointer-events:none;
  box-shadow:2px 0 8px rgba(0,0,0,.18);
}
.dv-body::before{
  content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(
    -45deg,
    transparent,transparent 6px,
    rgba(255,255,255,.10) 6px,rgba(255,255,255,.10) 9px
  );
  pointer-events:none;
}
.dv-body::after{
  content:'';position:absolute;top:0;left:0;right:0;
  height:5px;background:rgba(255,255,255,.35);
  pointer-events:none;
}
.dv-label-pill{
  position:relative;z-index:2;
  writing-mode:vertical-lr;
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.28);
  border-radius:20px;
  padding:12px 3px;
  font-size:11px;font-weight:800;letter-spacing:.1em;
  color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4);
  white-space:nowrap;
  pointer-events:none;
}

/* ─ SELECTED STATE ─ */
.divider.sel-div .dh-body,
.divider.sel-div .dv-body{
  outline:2.5px solid var(--sel);
  outline-offset:2px;
  box-shadow:0 0 0 4px rgba(59,130,246,.18),0 2px 8px rgba(0,0,0,.18);
}

/* ─ RESIZE HANDLE ─ */
.div-rh{
  position:absolute;
  width:14px;height:14px;
  background:#fff;
  border:2px solid var(--sel);
  border-radius:50%;
  z-index:26;cursor:ew-resize;
  display:none;
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.divider.sel-div .div-rh{display:block;}
.div-rh-e{right:-8px;top:50%;transform:translateY(-50%);}
.div-rh-s{bottom:-8px;left:50%;transform:translateX(-50%);cursor:ns-resize;}


/* ── JUNCTION NODES ── */
.junc{
  position:absolute;z-index:12;
  width:16px;height:16px;
  border-radius:50%;
  background:#fff;
  border:2.5px solid #94a3b8;
  cursor:move;
  transform:translate(-50%,-50%);
  transition:border-color .15s,box-shadow .15s;
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.junc:hover{ border-color:var(--sel); box-shadow:0 0 0 3px rgba(59,130,246,.2); }
.junc.sel{ border-color:var(--sel); background:#dbeafe; box-shadow:0 0 0 4px rgba(59,130,246,.25); }
/* ports on junction — same as box ports but always visible in con-mode */
.cm .junc .port{ display:flex !important; }

/* ── MULTI-SELECT ── */
#selrect{
  position:absolute;z-index:200;pointer-events:none;
  border:1.5px solid var(--sel);
  background:rgba(59,130,246,.08);
  border-radius:3px;display:none;
}
.box.msel .box-body{outline:2px solid var(--sel);outline-offset:-1px;border-radius:7px;}
.box.msel{z-index:4;}

/* ── ZOOM CONTROLS ── */
#zoom-bar{
  position:fixed;right:20px;bottom:20px;z-index:300;
  display:flex;flex-direction:column;gap:4px;
  background:rgba(15,22,40,.88);
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:8px 6px;
  backdrop-filter:blur(8px);
  box-shadow:0 4px 20px rgba(0,0,0,.35);
}
.zb{
  width:34px;height:34px;border-radius:7px;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;cursor:pointer;
  transition:background .12s,transform .08s;
  background:rgba(255,255,255,.1);color:#fff;
  font-family:'Noto Sans KR',sans-serif;
}
.zb:hover{background:rgba(255,255,255,.22);transform:scale(1.08);}
.zb:active{transform:scale(.95);}
#zoom-pct{
  font-size:10px;font-weight:700;color:rgba(255,255,255,.65);
  text-align:center;letter-spacing:.5px;padding:2px 0;
  cursor:pointer;
}
#zoom-pct:hover{color:#fff;}
.z-div{height:1px;background:rgba(255,255,255,.12);margin:2px 0;}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(50px);
  background:#1e293b;color:#fff;padding:8px 18px;border-radius:7px;
  font-size:11px;font-weight:600;z-index:500;
  transition:transform .2s,opacity .2s;opacity:0;pointer-events:none;}
#toast.on{transform:translateX(-50%) translateY(0);opacity:1;}

/* ── CTX MENU ── */
#ctx{position:fixed;z-index:400;background:#fff;border:1px solid var(--border);
  border-radius:7px;box-shadow:0 4px 16px rgba(0,0,0,.12);padding:4px;display:none;min-width:130px;}
#ctx.on{display:block;}
.ci{padding:7px 11px;font-size:11px;font-weight:600;color:var(--navy);
  cursor:pointer;border-radius:4px;display:flex;align-items:center;gap:6px;}
.ci:hover{background:var(--blue-lt);}
.ci.del{color:var(--red);}
.ci.del:hover{background:var(--red-lt);}


/* ── TAB BAR ── */
#tabbar{
  flex-shrink:0;
  display:flex;align-items:stretch;
  background:#1e2a3a;
  border-bottom:2px solid #0a1628;
  padding:0 12px;gap:2px;
  height:38px;
  position:relative;z-index:150;
}
.tab{
  display:inline-flex;align-items:center;gap:7px;
  padding:0 18px;
  font-size:12px;font-weight:700;
  color:rgba(255,255,255,.45);
  cursor:pointer;border-bottom:3px solid transparent;
  margin-bottom:-2px;transition:color .15s,border-color .15s;
  white-space:nowrap;font-family:'Noto Sans KR',sans-serif;
  user-select:none;
}
.tab:hover{color:rgba(255,255,255,.75);}
.tab.act{color:#fff;border-bottom-color:var(--sel);}
.tab .tab-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;

// ═══════════════════════════
// ORTHOGONAL ROUTING
// ═══════════════════════════
function route(p1,s1,p2,s2){
  const G=34;
  let x1=p1.x,y1=p1.y,x2=p2.x,y2=p2.y;
  let ex1=x1,ey1=y1,ex2=x2,ey2=y2;
  if(s1==='t') ey1-=G; if(s1==='b') ey1+=G;
  if(s1==='l') ex1-=G; if(s1==='r') ex1+=G;
  if(s2==='t') ey2-=G; if(s2==='b') ey2+=G;
  if(s2==='l') ex2-=G; if(s2==='r') ex2+=G;

  const iv1=s1==='t'||s1==='b', iv2=s2==='t'||s2==='b';
  let pts=[[x1,y1],[ex1,ey1]];

  if(iv1&&iv2){const my=(ey1+ey2)/2; pts.push([ex1,my],[ex2,my]);}
  else if(!iv1&&!iv2){const mx=(ex1+ex2)/2; pts.push([mx,ey1],[mx,ey2]);}
  else if(iv1&&!iv2){pts.push([ex2,ey1]);}
  else{pts.push([ex1,ey2]);}

  pts.push([ex2,ey2],[x2,y2]);
  // dedup
  const r=[[pts[0][0],pts[0][1]]];
  for(let i=1;i<pts.length;i++){
    const p=r[r.length-1];
    if(Math.abs(pts[i][0]-p[0])>0.5||Math.abs(pts[i][1]-p[1])>0.5) r.push([pts[i][0],pts[i][1]]);
  }
  return 'M '+r.map(([x,y])=>`${Math.round(x)},${Math.round(y)}`).join(' L ');
}
function routeToCursor(fid,fs,mx,my){
  const p=portPos(fid,fs); if(!p) return '';
  const G=34;
  let ex=p.x,ey=p.y;
  if(fs==='t') ey-=G; if(fs==='b') ey+=G;
  if(fs==='l') ex-=G; if(fs==='r') ex+=G;
  const iv=fs==='t'||fs==='b';
  const pts=[[p.x,p.y],[ex,ey],...(iv?[[mx,ey],[mx,my]]:[[ex,my],[mx,my]])];
  return 'M '+pts.map(([x,y])=>`${Math.round(x)},${Math.round(y)}`).join(' L ');
}

function refreshConns(){conns.forEach(redrawConn);}

function redrawConn(c){
  const p1=portPos(c.f,c.fp), p2=portPos(c.t,c.tp);
  if(!p1||!p2) return;
  const d=route(p1,c.fp,p2,c.tp);
  c.pe.setAttribute('d',d); c.he.setAttribute('d',d);
}

function addConnEl(c){
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  const he=document.createElementNS('http://www.w3.org/2000/svg','path');
  he.setAttribute('class','ch');
  const pe=document.createElementNS('http://www.w3.org/2000/svg','path');
  pe.setAttribute('class','cp');
  [he,pe].forEach(cel=>{
    cel.addEventListener('click',e=>{
      e.stopPropagation();
      if(mode==='con'){
        // In connect mode: create junction at click position, split the line
        const r=cvs.getBoundingClientRect();
        const cx=snap((e.clientX-r.left)/zoom);
        const cy=snap((e.clientY-r.top)/zoom);
        const jd={id:uid(),x:cx,y:cy};
        mkJunction(jd);
        // Split: original A→B becomes A→junction + junction→B
        const jc1={id:uid(),f:c.f,fp:c.fp,t:jd.id,tp:'t'};
        const jc2={id:uid(),f:jd.id,fp:'b',t:c.t,tp:c.tp};
        removeConnObj(c);
        conns.push(jc1); addConnEl(jc1);
        conns.push(jc2); addConnEl(jc2);
        selJunc_fn(juncMap[jd.id].el, jd.id);
        toast('⦿ 분기점 생성됨 — 포트(●)에서 새 연결선을 그으세요');
      } else {
        selConn_fn(c);
      }
    });
    cel.addEventListener('contextmenu',e=>{e.preventDefault();selConn_fn(c);showCtx(e,'conn',c);});
  });
  g.appendChild(he); g.appendChild(pe);
  cl.appendChild(g);
  c.pe=pe; c.he=he; c.g=g;
  redrawConn(c);
}

function mkBox(d){
  const el=document.createElement('div');
  el.className='box t-'+d.th;

  el.style.left=d.x+'px';el.style.top=d.y+'px';el.style.width=d.w+'px';el.style.height=d.h+'px';

  // body
  const bd=document.createElement('div'); bd.className='box-body';
  el.appendChild(bd);

  // ports
  [{s:'t',cls:'port-t'},{s:'b',cls:'port-b'},{s:'l',cls:'port-l'},{s:'r',cls:'port-r'}].forEach(({s,cls})=>{
    const p=document.createElement('div');
    p.className='port '+cls; p.dataset.bid=d.id; p.dataset.s=s;
    p.addEventListener('mousedown',onPortDown);
    p.addEventListener('click',onPortClick);
    el.appendChild(p);
  });

  // resize handles
  ['nw','n','ne','e','se','s','sw','w'].forEach(dir=>{
    const h=document.createElement('div');
    h.className='rh rh-'+dir; h.dataset.dir=dir;
    h.addEventListener('mousedown',onRhDown);
    el.appendChild(h);
  });

  // drag + select on box element (bd has pointer-events:none so we listen on el)
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('port')||e.target.classList.contains('rh')) return;
    onBoxDown(e,el,d.id);
  });
  el.addEventListener('contextmenu',e=>{e.preventDefault();selBox_fn(el,d.id);showCtx(e,'box',d.id);});

  cvs.appendChild(el);
  boxMap[d.id]={el,d:{...d}};
  renderBoxBody(boxMap[d.id]);
  return el;
}

  document.getElementById('btn-copy').style.borderColor='';

function updateMultiBadge(){

  if(n>1) hint.textContent=`${n}개 선택됨 — 드래그로 한번에 이동 | Del 삭제 | Ctrl+C 복사`;

// ═══════════════════════════
// DRAG-MOVE
// ═══════════════════════════
let DS=null;
function onBoxDown(e,bx,id){
  if(mode==='con') return;
  if(e.button!==0) return;
  e.stopPropagation(); e.preventDefault();

  const additive = e.shiftKey;
  if(additive && multiSel.has(id)){
    // Shift+click on already-selected → deselect only
    bx.classList.remove('sel','msel');
    multiSel.delete(id);
    if(selBoxId===id){ selBox=null; selBoxId=null; }
    updateMultiBadge();
    return;
  }

  // If clicking a box already in the group (no shift) → keep group, just drag
  const keepGroup = !additive && multiSel.size > 1 && multiSel.has(id);
  if(!keepGroup) selBox_fn(bx, id, additive);

  // Snapshot AFTER selection is finalized
  const snapshots={};
  multiSel.forEach(bid=>{
    const b=boxMap[bid];
    if(b) snapshots[bid]={ox:parseFloat(b.el.style.left),oy:parseFloat(b.el.style.top)};
  });
  DS={bx,sx:e.clientX,sy:e.clientY,ox:parseFloat(bx.style.left),oy:parseFloat(bx.style.top),mv:false,z:zoom,snapshots};
  document.addEventListener('mousemove',onDmove);
  document.addEventListener('mouseup',onDup);
}
function onDmove(e){
  if(!DS) return;
  const dx=e.clientX-DS.sx, dy=e.clientY-DS.sy;
  if(!DS.mv&&Math.abs(dx)+Math.abs(dy)<4) return;
  DS.mv=true;
  const ddx=dx/DS.z, ddy=dy/DS.z;
  if(Object.keys(DS.snapshots).length>1){
    // move all selected
    Object.entries(DS.snapshots).forEach(([bid,{ox,oy}])=>{
      const b=boxMap[bid];
      if(b){ b.el.style.left=snap(Math.max(0,ox+ddx))+'px'; b.el.style.top=snap(Math.max(0,oy+ddy))+'px'; }
    });
  } else {
    DS.bx.style.left=snap(Math.max(0,DS.ox+ddx))+'px';
    DS.bx.style.top =snap(Math.max(0,DS.oy+ddy))+'px';
  }
  refreshConns();
}
function onDup(){if(DS?.mv) markDirty(); DS=null;document.removeEventListener('mousemove',onDmove);document.removeEventListener('mouseup',onDup);}

// ═══════════════════════════
// RESIZE
// ═══════════════════════════
let RS=null;
function onRhDown(e){
  if(e.button!==0) return; e.stopPropagation(); e.preventDefault();
  const bx=e.currentTarget.closest('.box');
  const id=bx.id.replace('bx-','');
  selBox_fn(bx,id);
  RS={bx,dir:e.currentTarget.dataset.dir,sx:e.clientX,sy:e.clientY,
      ox:parseFloat(bx.style.left),oy:parseFloat(bx.style.top),
      ow:bx.offsetWidth,oh:bx.offsetHeight,z:zoom};
  document.addEventListener('mousemove',onRmove);
  document.addEventListener('mouseup',onRup);
}
function onRmove(e){
  if(!RS) return;
  const {bx,dir,sx,sy,ox,oy,ow,oh,z}=RS;
  const dx=(e.clientX-sx)/z, dy=(e.clientY-sy)/z, MN=80;
  let l=ox,t=oy,w=ow,h=oh;
  if(dir.includes('e')) w=Math.max(MN,ow+dx);
  if(dir.includes('s')) h=Math.max(MN,oh+dy);
  if(dir.includes('w')){const nw=Math.max(MN,ow-dx);l=ox+ow-nw;w=nw;}
  if(dir.includes('n')){const nh=Math.max(MN,oh-dy);t=oy+oh-nh;h=nh;}
  bx.style.left=snap(l)+'px'; bx.style.top=snap(t)+'px';
  bx.style.width=snap(w)+'px'; bx.style.height=snap(h)+'px';
  refreshConns();
}
function onRup(){RS=null;document.removeEventListener('mousemove',onRmove);document.removeEventListener('mouseup',onRup);}

// ═══════════════════════════
// CONNECT MODE
// ═══════════════════════════
function onPortDown(e){
  // use mousedown only to prevent box drag from firing
  if(mode!=='con') return;
  e.stopPropagation(); e.preventDefault();
}
function onPortClick(e){
  if(mode!=='con') return;
  e.stopPropagation(); e.preventDefault();
  const bid=e.currentTarget.dataset.bid, s=e.currentTarget.dataset.s;
  if(!connecting){
    connecting={fid:bid,fs:s,el:e.currentTarget};
    e.currentTarget.classList.add('active');
    document.addEventListener('mousemove',onCMove);
    toast('연결 시작 — 연결할 박스의 포트(●)를 클릭하세요 | ESC 취소');
  } else {
    if(connecting.fid===bid){ cancelConn(); return; }
    if(conns.some(c=>c.f===connecting.fid&&c.fp===connecting.fs&&c.t===bid&&c.tp===s)){
      toast('이미 연결된 포트입니다'); cancelConn(); return;
    }
    const c={id:uid(),f:connecting.fid,fp:connecting.fs,t:bid,tp:s};
    conns.push(c); addConnEl(c);
    cancelConn(); toast('✓ 연결선 추가됨');
  }
}
function onCMove(e){
  if(!connecting) return;
  const r=cvs.getBoundingClientRect();
  const p={x:(e.clientX-r.left)/zoom, y:(e.clientY-r.top)/zoom};
  tmp.setAttribute('d',routeToCursor(connecting.fid,connecting.fs,p.x,p.y));
}
function cancelConn(){
  if(connecting){connecting.el.classList.remove('active');connecting=null;}
  document.removeEventListener('mousemove',onCMove);
  tmp.setAttribute('d','');
}

function setMode(m){
  mode=m;
  document.body.classList.toggle('cm',m==='con');
  document.getElementById('btn-sel').classList.toggle('act',m==='sel');
  document.getElementById('btn-con').classList.toggle('act',m==='con');

    ?'포트(●) 클릭→연결 시작 | 연결선 클릭→분기점 생성 | ESC 취소'
    :'박스 클릭→편집 | 드래그→이동 | 모서리 드래그→크기조절 | Del→삭제';
}

function delSelected(){
  if(multiSel.size>0){
    const ids=[...multiSel];
    ids.forEach(id=>{ removeConnsByBox(id); boxMap[id]?.el.remove(); delete boxMap[id]; });
    selBox=null; selBoxId=null; multiSel.clear();
    showEmpty(); toast(`🗑 ${ids.length}개 박스 삭제됨`);
    document.getElementById('btn-del').classList.remove('ready');
    document.getElementById('btn-copy').style.background='';
    document.getElementById('btn-copy').style.borderColor='';
  } else if(selConn){
    removeConnObj(selConn); selConn=null; showEmpty(); toast('🗑 연결선 삭제됨');
  } else if(selDivId){
    delDiv(selDivId);
  } else if(selBoxId && boxMap[selBoxId]?.d?.isJunction){
    delJunc(selBoxId);
  } else {
    toast('삭제할 항목을 먼저 선택하세요');
  }
}
function delBox(id){
  removeConnsByBox(id); boxMap[id]?.el.remove(); delete boxMap[id];
  if(selBoxId===id){selBox=null;selBoxId=null;}
  showEmpty(); toast('🗑 삭제됨');
}

document.addEventListener('keydown',e=>{
  const tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA') return;
  if(e.key==='Escape'){cancelConn();setMode('sel');deselAll();}
  if((e.ctrlKey||e.metaKey)&&e.key==='a'){e.preventDefault();selectAll();}
  if((e.ctrlKey||e.metaKey)&&e.key==='c'){e.preventDefault();copySelected();}
  if((e.ctrlKey||e.metaKey)&&e.key==='v'){e.preventDefault();pasteBox();}
  if(e.key==='Delete'||e.key==='Backspace') delSelected();
  if(e.key==='c'||e.key==='C') setMode(mode==='con'?'sel':'con');
});

// ═══════════════════════════
// CANVAS CLICK
// ═══════════════════════════
// Rubber-band drag-select
let RB=null;
const selrect=document.getElementById('selrect');

cvs.addEventListener('mousedown',e=>{
  if(mode==='con') return;
  if(e.button!==0) return;
  // only start rubber-band on canvas background (not a box)
  if(e.target!==cvs && e.target!==svgl && e.target!==cl && !e.target.closest('defs')) return;
  if(!e.shiftKey) deselAll();
  const r=cvs.getBoundingClientRect();
  const sx=(e.clientX-r.left)/zoom, sy=(e.clientY-r.top)/zoom;
  RB={sx,sy,ex:sx,ey:sy};
  selrect.style.display='block';
  selrect.style.left=sx+'px'; selrect.style.top=sy+'px';
  selrect.style.width='0px'; selrect.style.height='0px';
  document.addEventListener('mousemove',onRBmove);
  document.addEventListener('mouseup',onRBup);
  e.preventDefault();
});

function onRBmove(e){
  if(!RB) return;
  const r=cvs.getBoundingClientRect();
  RB.ex=(e.clientX-r.left)/zoom; RB.ey=(e.clientY-r.top)/zoom;
  const x=Math.min(RB.sx,RB.ex), y=Math.min(RB.sy,RB.ey);
  const w=Math.abs(RB.ex-RB.sx), h=Math.abs(RB.ey-RB.sy);
  selrect.style.left=x+'px'; selrect.style.top=y+'px';
  selrect.style.width=w+'px'; selrect.style.height=h+'px';
}

function onRBup(e){
  if(!RB){document.removeEventListener('mousemove',onRBmove);document.removeEventListener('mouseup',onRBup);return;}
  const x1=Math.min(RB.sx,RB.ex), y1=Math.min(RB.sy,RB.ey);
  const x2=Math.max(RB.sx,RB.ex), y2=Math.max(RB.sy,RB.ey);
  selrect.style.display='none'; RB=null;
  document.removeEventListener('mousemove',onRBmove);
  document.removeEventListener('mouseup',onRBup);
  // only select if dragged meaningfully
  if(x2-x1<6 && y2-y1<6) return;
  let firstId=null, firstEl=null;
  Object.entries(boxMap).forEach(([id,b])=>{
    const bx=parseFloat(b.el.style.left), by=parseFloat(b.el.style.top);
    const bx2=bx+b.el.offsetWidth, by2=by+b.el.offsetHeight;
    if(bx<x2 && bx2>x1 && by<y2 && by2>y1){
      b.el.classList.add('sel','msel');
      multiSel.add(id);
      if(!firstId){firstId=id;firstEl=b.el;}
    }
  });
  if(firstId){
    selBox=firstEl; selBoxId=firstId;
    showBoxPanel(firstId);
    document.getElementById('btn-del').classList.add('ready');
    document.getElementById('btn-copy').style.background='rgba(59,130,246,.25)';
    document.getElementById('btn-copy').style.borderColor='rgba(59,130,246,.5)';
  }
  updateMultiBadge();
}

cvs.addEventListener('click',e=>{
  if(mode==='con'&&connecting) cancelConn();
});

// COPY / PASTE
// ═══════════════════════════
let clipboard = null;

function copySelected(){
  const ids = multiSel.size > 0 ? [...multiSel] : (selBoxId ? [selBoxId] : []);
  if(!ids.length){ toast('복사할 박스를 먼저 선택하세요'); return; }

  // Store array of box snapshots with relative offsets from group anchor
  const items = ids.map(id=>{
    const b = boxMap[id]; if(!b) return null;
    return {
      role:b.d.role, name:b.d.name, contact:b.d.contact,
      th:b.d.th, textStyle:{...( b.d.textStyle||{})},
      w:b.el.offsetWidth, h:b.el.offsetHeight,
      x:parseFloat(b.el.style.left), y:parseFloat(b.el.style.top),
    };
  }).filter(Boolean);

  // Anchor = top-left corner of the group bounding box
  const minX = Math.min(...items.map(i=>i.x));
  const minY = Math.min(...items.map(i=>i.y));
  clipboard = { items, anchorX:minX, anchorY:minY, offset:0 };

  const pb = document.getElementById('btn-paste');
  pb.removeAttribute('disabled'); pb.style.opacity='1';
  toast(`✓ ${items.length}개 복사됨 — Ctrl+V 또는 붙여넣기`);
}

function pasteBox(){
  if(!clipboard || !clipboard.items?.length){ toast('복사된 박스가 없습니다'); return; }
  const OFFSET = 20;
  const {items, anchorX, anchorY} = clipboard;
  const dx = snap(anchorX + clipboard.offset + OFFSET) - anchorX;
  const dy = snap(anchorY + clipboard.offset + OFFSET) - anchorY;
  clipboard.offset += OFFSET;  // shift next paste

  // Clear old selection
  clearMultiSel();

  const newIds = [];
  items.forEach(item=>{
    const d = {
      id: uid(),
      x: snap(item.x + dx), y: snap(item.y + dy),
      w: item.w, h: item.h,
      role: item.role, name: item.name,
      contact: item.contact, th: item.th,
      textStyle: {...(item.textStyle||{})},
    };
    const el = mkBox(d);
    el.classList.add('sel','msel');
    multiSel.add(d.id);
    newIds.push(d.id);
  });

  // Set primary selection to first pasted box
  if(newIds.length){
    const firstId = newIds[0];
    selBox = boxMap[firstId].el;
    selBoxId = firstId;
    showBoxPanel(firstId);
    document.getElementById('btn-del').classList.add('ready');
    document.getElementById('btn-copy').style.background='rgba(59,130,246,.25)';
    document.getElementById('btn-copy').style.borderColor='rgba(59,130,246,.5)';
  }
  updateMultiBadge();
  toast(`📋 ${newIds.length}개 붙여넣기 완료`);
}


function selectAll(){
  clearMultiSel();
  let firstId=null,firstEl=null;
  Object.entries(boxMap).forEach(([id,b])=>{
    b.el.classList.add('sel','msel'); multiSel.add(id);
    if(!firstId){firstId=id;firstEl=b.el;}
  });
  if(firstId){selBox=firstEl;selBoxId=firstId;showBoxPanel(firstId);
    document.getElementById('btn-del').classList.add('ready');
    document.getElementById('btn-copy').style.background='rgba(59,130,246,.25)';
    document.getElementById('btn-copy').style.borderColor='rgba(59,130,246,.5)';
  }
  updateMultiBadge();
  toast(`✓ 전체 ${multiSel.size}개 선택됨`);
}

function resetAll(){
  pageStates[currentPage]=null;
  loadPageState(currentPage);
  toast('↺ 현재 페이지 초기화됨');
}

// ═══════════════════════════
function clearCanvas(){
  Object.values(boxMap).forEach(b=>b.el.remove());
  boxMap={};
  conns.forEach(c=>c.g?.remove());
  conns=[]; cl.innerHTML='';
  Object.values(divMap).forEach(dv=>dv.el.remove());
  divMap={};
  Object.values(juncMap).forEach(j=>j.el.remove());
  juncMap={};
  deselAll();
}

function savePageState(idx){
  pageStates[idx]={
    boxes: Object.values(boxMap).map(b=>({
      ...b.d, x:parseFloat(b.el.style.left),y:parseFloat(b.el.style.top),
      w:b.el.offsetWidth,h:b.el.offsetHeight,
    })),
    conns: conns.map(c=>({id:c.id,f:c.f,fp:c.fp,t:c.t,tp:c.tp})),
    juncs: Object.values(juncMap).map(j=>({...j.d})),
    divs: Object.values(divMap).map(dv=>({
      ...dv.d, x:parseFloat(dv.el.style.left),y:parseFloat(dv.el.style.top),
    })),
    zoom, scrollLeft:wrap.scrollLeft, scrollTop:wrap.scrollTop,
  };
}

function loadPageState(idx){
  const def = PAGE_DEFS[idx];
  const saved = pageStates[idx];
  clearCanvas();
  uidx = 300 + idx*100;
  const boxes = saved ? saved.boxes : def.boxes;
  const cs    = saved ? saved.conns : def.conns;
  boxes.forEach(d=>mkBox({...d}));
  cs.forEach(c=>{conns.push({...c});addConnEl(conns[conns.length-1]);});
  const juncs = saved ? (saved.juncs||[]) : (def.juncs||[]);
  juncs.forEach(d=>mkJunction({...d}));
  const divs = saved ? (saved.divs||[]) : (def.divs||[]);
  divs.forEach(d=>mkDivider({...d}));
  if(saved){
    setZoom(saved.zoom||1);
    setTimeout(()=>{wrap.scrollLeft=saved.scrollLeft||0;wrap.scrollTop=saved.scrollTop||0;},30);
  } else {
    setZoom(1);
    setTimeout(()=>{wrap.scrollLeft=0;wrap.scrollTop=0;},30);
  }
}

function switchPage(idx){
  if(idx===currentPage) return;
  savePageState(currentPage);
  currentPage=idx;
  loadPageState(idx);
  // update tab UI
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('act',i===idx));
  document.getElementById('tab-info').textContent=PAGE_DEFS[idx].label;
  toast('📄 '+PAGE_DEFS[idx].label+' 페이지');
}

// ═══════════════════════════
// ZOOM
// ═══════════════════════════

function setZoom(z, cx, cy){
  const prev = zoom;
  zoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, Math.round(z*10)/10));

  // Keep scroll centered on the same canvas point
  const wEl = wrap;
  const cx2 = cx != null ? cx : wEl.scrollLeft + wEl.clientWidth/2;
  const cy2 = cy != null ? cy : wEl.scrollTop  + wEl.clientHeight/2;
  const canvasCx = cx2 / prev;
  const canvasCy = cy2 / prev;

  cvs.style.transform = `scale(${zoom})`;
  cvs.style.transformOrigin = '0 0';
  cvs.style.width  = (2100 / zoom) + 'px';  // keep wrapper scrollable
  cvs.style.height = (1100 / zoom) + 'px';

  // Adjust scroll to re-center
  wEl.scrollLeft = canvasCx * zoom - wEl.clientWidth/2;
  wEl.scrollTop  = canvasCy * zoom - wEl.clientHeight/2;

  document.getElementById('zoom-pct').textContent = Math.round(zoom*100)+'%';
  refreshConns();
}

function fitView(){
  const bxs = Object.values(boxMap);
  if(!bxs.length){ setZoom(1); return; }
  const xs = bxs.map(b=>parseFloat(b.el.style.left));
  const ys = bxs.map(b=>parseFloat(b.el.style.top));
  const x2 = bxs.map(b=>parseFloat(b.el.style.left)+b.el.offsetWidth);
  const y2 = bxs.map(b=>parseFloat(b.el.style.top)+b.el.offsetHeight);
  const minX=Math.min(...xs)-30, minY=Math.min(...ys)-30;
  const maxX=Math.max(...x2)+30, maxY=Math.max(...y2)+30;
  const zx = wrap.clientWidth  / (maxX-minX);
  const zy = wrap.clientHeight / (maxY-minY);
  const z  = Math.min(zx, zy, 1.5);
  setZoom(z);
  setTimeout(()=>{ wrap.scrollLeft = minX*zoom - 20; wrap.scrollTop = minY*zoom - 20; }, 30);
}

// Ctrl+Wheel to zoom
wrap.addEventListener('wheel', e=>{
  if(!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  const rect = cvs.getBoundingClientRect();
  const cx = (e.clientX - rect.left);
  const cy = (e.clientY - rect.top);
  const delta = e.deltaY < 0 ? 0.1 : -0.1;
  setZoom(zoom + delta, e.clientX - wrap.getBoundingClientRect().left, e.clientY - wrap.getBoundingClientRect().top);
}, {passive:false});

// Keyboard zoom
document.addEventListener('keydown', e2=>{
  const tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA') return;
  if(e2.key==='='||e2.key==='+') setZoom(zoom+.1);
  if(e2.key==='-'||e2.key==='_') setZoom(zoom-.1);
  if(e2.key==='0') setZoom(1);
  if(e2.key==='f'||e2.key==='F') fitView();
});


// ═══════════════════════════
// PERSISTENT STORAGE (localStorage)
// ═══════════════════════════
const LS_KEY = 'safety_org_v2';

function saveToStorage(){
  if(typeof AUTH==='undefined'||!AUTH.isAdmin()){ toast('⚠ 관리자만 저장할 수 있습니다'); return; }
  // snapshot current page first
  savePageState(currentPage);
  const payload = {
    version: 2,
    savedAt: new Date().toISOString(),
    pages: pageStates.map((ps, idx) => ps || null),
  };
  localStorage.setItem(LS_KEY, JSON.stringify(payload));
  markClean();
  const t = new Date();
  const ts = String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0')+':'+String(t.getSeconds()).padStart(2,'0');
  const ind = document.getElementById('save-indicator');
  ind.textContent = '✓ ' + ts + ' 저장됨';
  ind.className = 'saved';
  setTimeout(()=>{ ind.textContent=''; ind.className=''; }, 4000);
  toast('💾 저장됨 — ' + ts);
}

function loadFromStorage(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const payload = JSON.parse(raw);
    if(!payload.pages) return false;
    payload.pages.forEach((ps, idx)=>{ if(ps) pageStates[idx] = ps; });
    return true;
  } catch(e){ return false; }
}

// Mark as dirty (unsaved changes) — called on any edit
let _isDirty = false;
function markDirty(){
  if(!_isDirty){
    _isDirty = true;
    document.getElementById('btn-save')?.classList.add('dirty');
  }
}
function markClean(){
  _isDirty = false;
  document.getElementById('btn-save')?.classList.remove('dirty');
}

// Ctrl+S shortcut
document.addEventListener('keydown', e=>{
  if((e.ctrlKey||e.metaKey) && e.key==='s'){
    e.preventDefault();
    if(typeof AUTH!=='undefined' && AUTH.isAdmin()) saveToStorage();
  }
});


// ═══════════════════════════
// SMART PRINT
// ═══════════════════════════
function smartPrint(){
  // 1. Compute bounding box of all boxes + dividers
  const bxs = Object.values(boxMap);
  const dvs = Object.values(divMap);
  if(!bxs.length){ window.print(); return; }

  const allX = bxs.map(b=>parseFloat(b.el.style.left));
  const allY = bxs.map(b=>parseFloat(b.el.style.top));
  const allX2 = bxs.map(b=>parseFloat(b.el.style.left)+b.el.offsetWidth);
  const allY2 = bxs.map(b=>parseFloat(b.el.style.top)+b.el.offsetHeight);
  dvs.forEach(dv=>{
    allX.push(parseFloat(dv.el.style.left));
    allY.push(parseFloat(dv.el.style.top));
    allX2.push(parseFloat(dv.el.style.left)+(dv.el.offsetWidth||0));
    allY2.push(parseFloat(dv.el.style.top)+(dv.el.offsetHeight||0));
  });

  const minX = Math.min(...allX) - 40;
  const minY = Math.min(...allY) - 40;
  const cW   = Math.max(...allX2) - minX + 40;
  const cH   = Math.max(...allY2) - minY + 40;

  // A4 landscape printable area (mm→px at 96dpi: 277mm*272mm ≈ 1046*1028px)
  const pageW = 1046, pageH = 1028;
  const scaleX = pageW / cW;
  const scaleY = pageH / cH;
  const scale  = Math.min(scaleX, scaleY, 1); // never upscale

  // Center offset inside page
  const offX = (pageW - cW*scale) / 2 / scale - minX;
  const offY = (pageH - cH*scale) / 2 / scale - minY;

  const cvs = document.getElementById('canvas');
  const prev = cvs.style.transform;

  // Apply print transform
  cvs.style.transform = `scale(${scale}) translate(${offX}px,${offY}px)`;
  cvs.style.transformOrigin = '0 0';

  setTimeout(()=>{
    window.print();
    setTimeout(()=>{
      cvs.style.transform = prev;
    }, 500);
  }, 150);
}

function updateAdminUI(){
  const isAdmin = typeof AUTH !== 'undefined' && AUTH.isAdmin();
  document.body.classList.toggle('is-admin', isAdmin);

  // View badge (show briefly for non-admins on load)
  if(!isAdmin){
    const badge = document.getElementById('view-badge');
    badge.classList.add('show');
    setTimeout(()=>badge.classList.remove('show'), 3000);
    // Block keyboard edit shortcuts
    setMode('sel');
  } else {
    // restore default select mode active button
    document.getElementById('btn-sel')?.classList.add('act');
  }

  // Disable box/conn drag & resize for non-admins
  _editLocked = !isAdmin;
}
