<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안전보건 월간계획</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0f1117;
    --bg2:      #171b24;
    --bg3:      #1e2330;
    --border:   #2c3347;
    --orange:   #f97316;
    --orange2:  #fb923c;
    --blue:     #3b82f6;
    --green:    #22c55e;
    --red:      #ef4444;
    --yellow:   #eab308;
    --purple:   #a855f7;
    --cyan:     #06b6d4;
    --text:     #f1f5f9;
    --muted:    #64748b;
    --muted2:   #94a3b8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ── 배경 그리드 패턴 ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(249,115,22,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(249,115,22,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── 네비게이션 ── */
  nav {
    position: relative; z-index: 10;
    background: rgba(15,17,23,.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center;
    height: 56px; gap: 16px;
    flex-shrink: 0;
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: .1em;
    color: var(--orange);
    display: flex; align-items: center; gap: 8px;
    text-decoration: none;
  }
  .nav-logo span { color: var(--text); }
  .nav-links {
    display: flex; align-items: center; gap: 12px;
    margin-left: auto;
  }
  .nav-title {
    font-size: 14px; font-weight: 500; color: var(--muted2);
    padding-left: 16px;
    border-left: 1px solid var(--border);
  }

  /* 캘린더 페이지에서는 사용자 로그인 숨김 */
  #userNavBtn, #userDropdown { display: none !important; }

  /* ── 툴바 ── */
  .toolbar {
    position: relative; z-index: 5;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .toolbar-nav {
    display: flex; align-items: center; gap: 4px;
  }
  .btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted2);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
    display: flex; align-items: center; gap: 6px;
  }
  .btn:hover { color: var(--text); border-color: var(--muted); background: rgba(255,255,255,.05); }
  .btn.icon { padding: 7px 10px; font-size: 16px; }
  .btn.today { background: var(--orange); border-color: var(--orange); color: #fff; }
  .btn.today:hover { background: var(--orange2); border-color: var(--orange2); }

  .toolbar-month {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: .05em;
    color: var(--text);
    min-width: 200px;
  }
  .toolbar-month small {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px; font-weight: 400;
    color: var(--muted);
    letter-spacing: 0;
    margin-left: 8px;
  }
  .toolbar-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
  }
  .legend {
    display: flex; align-items: center; gap: 14px;
    font-size: 11px; color: var(--muted2);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .connect-indicator {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted);
    padding: 4px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .connect-indicator .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .connect-indicator .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .connect-indicator .dot.off { background: var(--red); box-shadow: 0 0 6px var(--red); }

  /* ── 캘린더 본체 ── */
  .calendar-wrap {
    position: relative; z-index: 1;
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden;
  }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .cal-weekday {
    padding: 10px 12px;
    font-size: 11px; font-weight: 700;
    letter-spacing: .1em;
    color: var(--muted);
    text-align: center;
    text-transform: uppercase;
  }
  .cal-weekday.sun { color: var(--red); }
  .cal-weekday.sat { color: var(--blue); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(6, 1fr);
    flex: 1;
  }

  .cal-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 6px 8px;
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
    transition: background .15s;
    cursor: default;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell:hover { background: rgba(255,255,255,.02); }
  .cal-cell.other-month { opacity: .3; }
  .cal-cell.today { background: rgba(249,115,22,.06); }
  .cal-cell.today .day-num {
    background: var(--orange);
    color: #fff;
    border-radius: 50%;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
  }

  .day-num {
    font-size: 13px; font-weight: 600;
    color: var(--muted2);
    margin-bottom: 4px;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .cal-cell.sun .day-num { color: var(--red); }
  .cal-cell.sat .day-num { color: var(--blue); }
  .cal-cell.today .day-num { color: #fff; }

  .events {
    display: flex; flex-direction: column; gap: 2px;
    overflow-y: auto; flex: 1;
    scrollbar-width: none;
  }
  .events::-webkit-scrollbar { display: none; }

  .event {
    font-size: 11px; font-weight: 500;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: filter .15s;
    line-height: 1.6;
  }
  .event:hover { filter: brightness(1.2); }

  .event.cat-education  { background: rgba(59,130,246,.18); color: #93c5fd; border-left: 2px solid var(--blue); }
  .event.cat-inspection { background: rgba(34,197,94,.18);  color: #86efac; border-left: 2px solid var(--green); }
  .event.cat-report     { background: rgba(239,68,68,.18);  color: #fca5a5; border-left: 2px solid var(--red); }
  .event.cat-meeting    { background: rgba(168,85,247,.18); color: #d8b4fe; border-left: 2px solid var(--purple); }
  .event.cat-drill      { background: rgba(249,115,22,.18); color: #fdba74; border-left: 2px solid var(--orange); }
  .event.cat-holiday    { background: rgba(234,179,8,.18);  color: #fde047; border-left: 2px solid var(--yellow); }
  .event.cat-default    { background: rgba(6,182,212,.18);  color: #67e8f9; border-left: 2px solid var(--cyan); }

  .more-events {
    font-size: 10px; color: var(--muted);
    padding: 1px 6px; cursor: pointer;
  }
  .more-events:hover { color: var(--orange); }

  /* ── 이벤트 상세 모달 ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 420px; max-width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
    padding: 28px;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }
  .modal-header {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 20px;
  }
  .modal-cat-bar {
    width: 4px; border-radius: 2px;
    min-height: 40px; flex-shrink: 0;
  }
  .modal-title { font-size: 18px; font-weight: 700; line-height: 1.4; }
  .modal-close {
    margin-left: auto;
    background: none; border: none;
    color: var(--muted); font-size: 20px;
    cursor: pointer; padding: 4px;
  }
  .modal-close:hover { color: var(--text); }
  .modal-info {
    display: flex; flex-direction: column; gap: 10px;
    font-size: 13px; color: var(--muted2);
  }
  .modal-info-row { display: flex; align-items: center; gap: 10px; }
  .modal-info-icon { width: 20px; text-align: center; flex-shrink: 0; }

  /* ── 관리자 전용 연결 패널 ── */
  .admin-panel {
    position: relative; z-index: 5;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 14px 24px;
    display: none; /* 기본 숨김 — 관리자 로그인 시에만 표시 */
    align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .admin-panel.show { display: flex; }
  .admin-label {
    font-size: 12px; color: var(--muted);
    flex-shrink: 0;
    display: flex; align-items: center; gap: 6px;
  }
  .admin-badge {
    background: rgba(239,68,68,.15);
    color: var(--red);
    font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
  }
  .admin-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    font-family: 'Courier New', monospace;
    outline: none;
    transition: border-color .2s;
  }
  .admin-input:focus { border-color: var(--orange); }
  .admin-input::placeholder { color: var(--muted); }
  .admin-btn {
    background: var(--orange);
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s;
    white-space: nowrap;
  }
  .admin-btn:hover { background: var(--orange2); }

  /* ── 로딩 ── */
  .loading-overlay {
    position: absolute; inset: 0;
    background: rgba(15,17,23,.8);
    display: none; align-items: center; justify-content: center;
    z-index: 50;
    flex-direction: column; gap: 12px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--muted2); }

  /* ── 에러 배너 ── */
  .error-banner {
    display: none;
    background: rgba(239,68,68,.1);
    border: 1px solid rgba(239,68,68,.3);
    border-radius: 8px;
    padding: 12px 20px;
    margin: 12px 24px;
    font-size: 13px;
    color: #fca5a5;
    align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .error-banner.show { display: flex; }
  .error-banner .error-close {
    margin-left: auto;
    background: none; border: none;
    color: #fca5a5; cursor: pointer;
    font-size: 16px;
  }

  @media (max-width: 768px) {
    nav { padding: 0 12px; }
    .toolbar { padding: 10px 12px; flex-wrap: wrap; }
    .toolbar-month { font-size: 22px; min-width: auto; }
    .legend { display: none; }
    .cal-weekday { padding: 8px 4px; font-size: 10px; }
    .cal-cell { padding: 4px; }
    .day-num { font-size: 11px; width: 22px; height: 22px; }
    .event { font-size: 10px; padding: 1px 4px; }
    .admin-panel { flex-wrap: wrap; }
    .admin-input { min-width: 0; }
  }
</style>
<script src="auth.js"></script>
<script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>

<!-- 네비게이션 — auth.js가 로그인 버튼 자동 주입 (우측) -->
<nav>
  <a class="nav-logo" href="index.html">⚠ <span>SAFETY</span> PORTAL</a>
  <span class="nav-title">안전보건 월간계획</span>
  <div class="nav-links">
    <div class="connect-indicator" id="statusIndicator">
      <div class="dot off"></div>
      <span>연결 안됨</span>
    </div>
  </div>
</nav>

<!-- 에러 배너 -->
<div class="error-banner" id="errorBanner">
  <span>⚠️</span>
  <span id="errorText"></span>
  <button class="error-close" onclick="this.parentElement.classList.remove('show')">✕</button>
</div>

<!-- 툴바 -->
<div class="toolbar">
  <div class="toolbar-nav">
    <button class="btn today" onclick="goToday()">오늘</button>
    <button class="btn icon" onclick="prevMonth()">◀</button>
    <button class="btn icon" onclick="nextMonth()">▶</button>
  </div>
  <div class="toolbar-month" id="monthLabel"></div>
  <div class="toolbar-right">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>안전교육</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>안전점검</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>신고/보고</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>회의</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>훈련</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>공휴일</div>
    </div>
  </div>
</div>

<!-- 캘린더 -->
<div class="calendar-wrap">
  <div class="cal-weekdays">
    <div class="cal-weekday sun">일</div>
    <div class="cal-weekday">월</div>
    <div class="cal-weekday">화</div>
    <div class="cal-weekday">수</div>
    <div class="cal-weekday">목</div>
    <div class="cal-weekday">금</div>
    <div class="cal-weekday sat">토</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">일정을 불러오는 중...</div>
  </div>
</div>

<!-- 관리자 전용: Google Calendar 연결 패널 -->
<div class="admin-panel" id="adminPanel">
  <span class="admin-label"><span class="admin-badge">ADMIN</span> Google Calendar 설정</span>
  <input class="admin-input" id="apiKeyInput" type="text" placeholder="Google API Key">
  <input class="admin-input" id="calIdInput" type="text" placeholder="캘린더 ID">
  <button class="admin-btn" onclick="saveConfig()">저장 및 연결</button>
</div>

<!-- 이벤트 상세 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-cat-bar" id="modalCatBar"></div>
      <div>
        <div class="modal-title" id="modalTitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-info" id="modalInfo"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  ★ 설정 — 여기에 API Key와 캘린더 ID를 입력하세요 ★
// ══════════════════════════════════════════════════
const CONFIG = {
  GOOGLE_API_KEY: '',   // ← Google API Key 붙여넣기
  GOOGLE_CAL_ID:  '',   // ← 캘린더 ID 붙여넣기 (예: xxxxx@group.calendar.google.com)
};
// ══════════════════════════════════════════════════

let currentYear, currentMonth;
let cachedEvents = {};

const MONTHS_KR = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

const CATEGORY_MAP = {
  '교육': 'education', '안전교육': 'education', '신규자': 'education', '특별교육': 'education',
  '점검': 'inspection', '안전점검': 'inspection', '합동점검': 'inspection', '정기점검': 'inspection',
  '감리': 'inspection', '감수': 'inspection',
  '보고': 'report', '신고': 'report', '산재': 'report', '보고서': 'report', '제출': 'report',
  '안전관리비': 'report', '작성': 'report',
  '회의': 'meeting', '산안위': 'meeting', '협의체': 'meeting', '간담회': 'meeting',
  '공정회의': 'meeting', '품의': 'meeting',
  '훈련': 'drill', '소방': 'drill', '대피': 'drill', '비상': 'drill',
  '공휴일': 'holiday', '휴일': 'holiday', '대체공휴일': 'holiday',
};

const CAT_COLORS = {
  education: 'var(--blue)', inspection: 'var(--green)', report: 'var(--red)',
  meeting: 'var(--purple)', drill: 'var(--orange)', holiday: 'var(--yellow)',
  default: 'var(--cyan)',
};

// ── Google Calendar API ──
async function fetchGoogleEvents(year, month) {
  const key = `${year}-${month}`;
  if (cachedEvents[key]) return cachedEvents[key];

  const apiKey = CONFIG.GOOGLE_API_KEY;
  const calId = CONFIG.GOOGLE_CAL_ID;

  const timeMin = new Date(year, month, 1).toISOString();
  const timeMax = new Date(year, month + 1, 0, 23, 59, 59).toISOString();
  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events?` +
    `key=${apiKey}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime&maxResults=250`;

  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`API 오류: ${resp.status}`);
  const data = await resp.json();

  const events = (data.items || []).map(item => {
    const start = item.start.dateTime || item.start.date;
    const end = item.end.dateTime || item.end.date;
    const isAllDay = !item.start.dateTime;
    let timeStr = '종일';
    if (!isAllDay) {
      const s = new Date(start);
      const e = new Date(end);
      timeStr = `${String(s.getHours()).padStart(2,'0')}:${String(s.getMinutes()).padStart(2,'0')} - ${String(e.getHours()).padStart(2,'0')}:${String(e.getMinutes()).padStart(2,'0')}`;
    }
    return {
      title: item.summary || '(제목 없음)',
      date: isAllDay ? start : start.slice(0, 10),
      time: timeStr,
      location: item.location || '-',
      desc: item.description || '',
    };
  });

  cachedEvents[key] = events;
  return events;
}

// ── 카테고리 분류 ──
function classifyEvent(title) {
  for (const [keyword, cat] of Object.entries(CATEGORY_MAP)) {
    if (title.includes(keyword)) return cat;
  }
  return 'default';
}

// ── 연결 상태 표시 ──
function updateStatus(connected) {
  const el = document.getElementById('statusIndicator');
  if (connected) {
    el.innerHTML = '<div class="dot on"></div><span>Google Calendar 연결됨</span>';
  } else {
    el.innerHTML = '<div class="dot off"></div><span>연결 안됨</span>';
  }
}

function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorBanner').classList.add('show');
}

// ── 캘린더 렌더링 ──
async function renderCalendar() {
  const grid = document.getElementById('calGrid');
  const loading = document.getElementById('loading');

  document.getElementById('monthLabel').innerHTML =
    `${currentYear}년 ${MONTHS_KR[currentMonth]}` +
    `<small>${currentYear}.${String(currentMonth+1).padStart(2,'0')}</small>`;

  let events = [];
  const hasConfig = CONFIG.GOOGLE_API_KEY && CONFIG.GOOGLE_CAL_ID;

  loading.classList.add('show');
  if (hasConfig) {
    try {
      events = await fetchGoogleEvents(currentYear, currentMonth);
      updateStatus(true);
    } catch (err) {
      console.error(err);
      showError('Google Calendar 연결 실패: ' + err.message);
      updateStatus(false);
    }
  } else {
    updateStatus(false);
  }
  loading.classList.remove('show');

  // 날짜별 이벤트 매핑
  const eventsByDate = {};
  events.forEach(ev => {
    if (!eventsByDate[ev.date]) eventsByDate[ev.date] = [];
    eventsByDate[ev.date].push(ev);
  });

  // 그리드 계산
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const prevDays = new Date(currentYear, currentMonth, 0).getDate();

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  let html = '';
  for (let i = 0; i < 42; i++) {
    const col = i % 7;
    let day, dateStr, isOther = false;

    if (i < firstDay) {
      day = prevDays - firstDay + 1 + i;
      const pm = currentMonth === 0 ? 12 : currentMonth;
      const py = currentMonth === 0 ? currentYear - 1 : currentYear;
      dateStr = `${py}-${String(pm).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      isOther = true;
    } else if (i >= firstDay + daysInMonth) {
      day = i - firstDay - daysInMonth + 1;
      const nm = currentMonth + 2 > 12 ? 1 : currentMonth + 2;
      const ny = currentMonth + 2 > 12 ? currentYear + 1 : currentYear;
      dateStr = `${ny}-${String(nm).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      isOther = true;
    } else {
      day = i - firstDay + 1;
      dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }

    const isToday = dateStr === todayStr;
    const isSun = col === 0;
    const isSat = col === 6;

    let classes = 'cal-cell';
    if (isOther) classes += ' other-month';
    if (isToday) classes += ' today';
    if (isSun) classes += ' sun';
    if (isSat) classes += ' sat';

    html += `<div class="${classes}">`;
    html += `<div class="day-num">${day}</div>`;
    html += `<div class="events">`;

    const dayEvents = eventsByDate[dateStr] || [];
    const maxShow = 3;
    dayEvents.slice(0, maxShow).forEach(ev => {
      const cat = classifyEvent(ev.title);
      html += `<div class="event cat-${cat}" onclick='showModal(${JSON.stringify(ev).replace(/'/g, "&#39;")})'>${ev.title}</div>`;
    });
    if (dayEvents.length > maxShow) {
      html += `<div class="more-events">+${dayEvents.length - maxShow}개 더보기</div>`;
    }
    html += `</div></div>`;
  }
  grid.innerHTML = html;
}

// ── 네비게이션 ──
function goToday() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  renderCalendar();
}
function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}
function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
}

// ── 모달 ──
function showModal(ev) {
  const cat = classifyEvent(ev.title);
  document.getElementById('modalCatBar').style.background = CAT_COLORS[cat];
  document.getElementById('modalTitle').textContent = ev.title;

  const infoHtml = `
    <div class="modal-info-row"><span class="modal-info-icon">📅</span><span>${ev.date} (${getDayName(ev.date)})</span></div>
    <div class="modal-info-row"><span class="modal-info-icon">🕐</span><span>${ev.time}</span></div>
    <div class="modal-info-row"><span class="modal-info-icon">📍</span><span>${ev.location}</span></div>
    ${ev.desc ? `<div style="margin-top:8px;padding-top:12px;border-top:1px solid var(--border);">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">상세 내용</div>
      <div style="font-size:13px;color:var(--text);line-height:1.7;">${ev.desc}</div>
    </div>` : ''}`;
  document.getElementById('modalInfo').innerHTML = infoHtml;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function getDayName(dateStr) { return ['일','월','화','수','목','금','토'][new Date(dateStr).getDay()]; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── 관리자 패널: 설정 저장 ──
function saveConfig() {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  const calId = document.getElementById('calIdInput').value.trim();
  if (!apiKey || !calId) { alert('API Key와 캘린더 ID를 모두 입력해주세요.'); return; }
  CONFIG.GOOGLE_API_KEY = apiKey;
  CONFIG.GOOGLE_CAL_ID = calId;
  cachedEvents = {};
  renderCalendar();
}

// ── auth.js 연동: 관리자 로그인 시 설정 패널 표시 ──
window.onAdminLogin = function() {
  document.getElementById('adminPanel').classList.add('show');
  if (CONFIG.GOOGLE_API_KEY) document.getElementById('apiKeyInput').value = CONFIG.GOOGLE_API_KEY;
  if (CONFIG.GOOGLE_CAL_ID) document.getElementById('calIdInput').value = CONFIG.GOOGLE_CAL_ID;
};
window.onAdminLogout = function() {
  document.getElementById('adminPanel').classList.remove('show');
};
window.onAuthStateChange = function() {
  if (AUTH.isAdmin()) {
    document.getElementById('adminPanel').classList.add('show');
    if (CONFIG.GOOGLE_API_KEY) document.getElementById('apiKeyInput').value = CONFIG.GOOGLE_API_KEY;
    if (CONFIG.GOOGLE_CAL_ID) document.getElementById('calIdInput').value = CONFIG.GOOGLE_CAL_ID;
  } else {
    document.getElementById('adminPanel').classList.remove('show');
  }
};

// ── 초기화 ──
const now = new Date();
currentYear = now.getFullYear();
currentMonth = now.getMonth();
renderCalendar();

// 이미 관리자 로그인 상태면 패널 표시
if (typeof AUTH !== 'undefined' && AUTH.isAdmin()) {
  document.getElementById('adminPanel').classList.add('show');
  if (CONFIG.GOOGLE_API_KEY) document.getElementById('apiKeyInput').value = CONFIG.GOOGLE_API_KEY;
  if (CONFIG.GOOGLE_CAL_ID) document.getElementById('calIdInput').value = CONFIG.GOOGLE_CAL_ID;
}
</script>
