<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안전보건 월간계획</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --nav-h: 70px;
    --bg:       #0f1117;
    --bg2:      #171b24;
    --bg3:      #1e2330;
    --border:   #2c3347;
    --orange:   #f97316;
    --orange2:  #fb923c;
    --blue:     #3b82f6;
    --green:    #22c55e;
    --red:      #ef4444;
    --yellow:   #eab308;
    --purple:   #a855f7;
    --cyan:     #06b6d4;
    --text:     #f1f5f9;
    --muted:    #64748b;
    --muted2:   #94a3b8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex; flex-direction: column;
    overflow: hidden;
    padding-top: var(--nav-h);
  }

  /* ── 배경 그리드 패턴 ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(249,115,22,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(249,115,22,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── 네비게이션 ── */
  nav {
    position: relative; z-index: 10;
    background: rgba(15,17,23,.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center;
    height: 56px; gap: 16px;
    flex-shrink: 0;
  }
  .nav-logo {
  font-family: 'Montserrat', sans-serif;
  font-size: 18px; letter-spacing: 0.16em; font-weight: 600;
    color: var(--orange);
    display: flex; align-items: center; gap: 8px;
    text-decoration: none;
  }
  .nav-logo span { color: var(--text); }
  .nav-links {
    display: flex; align-items: center; gap: 12px;
    margin-left: auto;
  }
  .nav-title {
    font-size: 14px; font-weight: 500; color: var(--muted2);
    padding-left: 16px;
    border-left: 1px solid var(--border);
  }

  /* 캘린더 페이지에서는 사용자 로그인 숨김 */
  #userNavBtn, #userDropdown { display: none !important; }

  /* 설정 아이콘 버튼 — 관리자 로그인 시에만 표시 */
  .settings-btn {
    display: none; /* 기본 숨김 */
    align-items: center; justify-content: center;
    width: 34px; height: 34px;
    background: #F1F5F9;
    border: 1px solid #E2E8F0;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: all .15s;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .settings-btn:hover { background: #E2E8F0; border-color: #94A3B8; }
  .settings-btn.show { display: flex; }

  /* ── 툴바 ── */
  .toolbar {
    position: relative; z-index: 5;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .toolbar-nav {
    display: flex; align-items: center; gap: 4px;
  }
  .btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted2);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
    display: flex; align-items: center; gap: 6px;
  }
  .btn:hover { color: var(--text); border-color: var(--muted); background: rgba(255,255,255,.05); }
  .btn.icon { padding: 7px 10px; font-size: 16px; }
  .btn.today { background: var(--orange); border-color: var(--orange); color: #fff; }
  .btn.today:hover { background: var(--orange2); border-color: var(--orange2); }

  .toolbar-month {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: .05em;
    color: var(--text);
    min-width: 200px;
  }
  .toolbar-month small {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px; font-weight: 400;
    color: var(--muted);
    letter-spacing: 0;
    margin-left: 8px;
  }
  /* ── 툴바 중앙 타이틀 ── */
  .toolbar-center {
    flex: 1;
    text-align: center;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: .15em;
    color: var(--text);
  }
  .toolbar-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
  }
  .toolbar-right-inner {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .site-name-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .site-name-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted2);
    white-space: nowrap;
  }
  .site-name-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 11px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    width: 280px;
    transition: border-color .2s;
  }
  .site-name-input:focus { border-color: var(--orange); }
  .site-name-input::placeholder { color: var(--muted); }
  .legend {
    display: flex; align-items: center; gap: 14px;
    font-size: 11px; color: var(--muted2);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .connect-indicator {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted);
    padding: 4px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .connect-indicator .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .connect-indicator .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .connect-indicator .dot.off { background: var(--red); box-shadow: 0 0 6px var(--red); }

  /* ── 캘린더 본체 ── */
  .calendar-wrap {
    position: relative; z-index: 1;
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden;
  }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: #f1f5f9;
    border-bottom: 1px solid #d1d5db;
    flex-shrink: 0;
  }
  .cal-weekday {
    padding: 10px 12px;
    font-size: 11px; font-weight: 700;
    letter-spacing: .1em;
    color: #475569;
    text-align: center;
    text-transform: uppercase;
  }
  .cal-weekday.sun { color: #dc2626; }
  .cal-weekday.sat { color: #2563eb; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(6, 1fr);
    flex: 1;
    background: #fff;
  }

  .cal-cell {
    border-right: 1px solid #e2e8f0;
    border-bottom: 1px solid #e2e8f0;
    padding: 6px 8px;
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
    transition: background .15s;
    cursor: default;
    background: #fff;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell:hover { background: #f8fafc; }
  .cal-cell.other-month { opacity: .35; }
  .cal-cell.today { background: #fff7ed; }
  .cal-cell.today .day-num {
    background: var(--orange);
    color: #fff;
    border-radius: 50%;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
  }

  .day-num {
    font-size: 13px; font-weight: 600;
    color: #334155;
    margin-bottom: 4px;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .cal-cell.sun .day-num { color: #dc2626; }
  .cal-cell.sat .day-num { color: #2563eb; }
  .cal-cell.today .day-num { color: #fff; }

  .events {
    display: flex; flex-direction: column; gap: 2px;
    overflow-y: auto; flex: 1;
    scrollbar-width: none;
  }
  .events::-webkit-scrollbar { display: none; }

  .event {
    font-size: 11px; font-weight: 500;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: filter .15s;
    line-height: 1.6;
  }
  .event:hover { filter: brightness(1.2); }

  .event.cat-education  { background: #dbeafe; color: #1e40af; border-left: 2px solid #3b82f6; }
  .event.cat-inspection { background: #dcfce7; color: #166534; border-left: 2px solid #22c55e; }
  .event.cat-report     { background: #fef9c3; color: #854d0e; border-left: 2px solid #eab308; }
  .event.cat-meeting    { background: #f3e8ff; color: #6b21a8; border-left: 2px solid #a855f7; }
  .event.cat-drill      { background: #ffedd5; color: #9a3412; border-left: 2px solid #f97316; }
  .event.cat-holiday    { background: #fee2e2; color: #991b1b; border-left: 2px solid #ef4444; }
  .event.cat-default    { background: #cffafe; color: #155e75; border-left: 2px solid #06b6d4; }

  .more-events {
    font-size: 10px; color: #94a3b8;
    padding: 1px 6px; cursor: pointer;
  }
  .more-events:hover { color: var(--orange); }

  /* ── 이벤트 상세 모달 ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 420px; max-width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
    padding: 28px;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }
  .modal-header {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 20px;
  }
  .modal-cat-bar {
    width: 4px; border-radius: 2px;
    min-height: 40px; flex-shrink: 0;
  }
  .modal-title { font-size: 18px; font-weight: 700; line-height: 1.4; }
  .modal-close {
    margin-left: auto;
    background: none; border: none;
    color: var(--muted); font-size: 20px;
    cursor: pointer; padding: 4px;
  }
  .modal-close:hover { color: var(--text); }
  .modal-info {
    display: flex; flex-direction: column; gap: 10px;
    font-size: 13px; color: var(--muted2);
  }
  .modal-info-row { display: flex; align-items: center; gap: 10px; }
  .modal-info-icon { width: 20px; text-align: center; flex-shrink: 0; }

  /* ── 관리자 전용 연결 패널 ── */
  .admin-panel {
    position: relative; z-index: 5;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 14px 24px;
    display: none; /* 기본 숨김 — 관리자 로그인 시에만 표시 */
    align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .admin-panel.show { display: flex; }
  .admin-label {
    font-size: 12px; color: var(--muted);
    flex-shrink: 0;
    display: flex; align-items: center; gap: 6px;
  }
  .admin-badge {
    background: rgba(239,68,68,.15);
    color: var(--red);
    font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px;
  }
  .admin-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    font-family: 'Courier New', monospace;
    outline: none;
    transition: border-color .2s;
  }
  .admin-input:focus { border-color: var(--orange); }
  .admin-input::placeholder { color: var(--muted); }
  .admin-btn {
    background: var(--orange);
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s;
    white-space: nowrap;
  }
  .admin-btn:hover { background: var(--orange2); }

  /* ── 로딩 ── */
  .loading-overlay {
    position: absolute; inset: 0;
    background: rgba(255,255,255,.85);
    display: none; align-items: center; justify-content: center;
    z-index: 50;
    flex-direction: column; gap: 12px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #e2e8f0;
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: #64748b; }

  /* ── 에러 배너 ── */


  @media (max-width: 768px) {
    nav { padding: 0 12px; }
    .toolbar { padding: 10px 12px; flex-wrap: wrap; }
    .toolbar-month { font-size: 22px; min-width: auto; }
    .toolbar-center { font-size: 14px; letter-spacing: .1em; }
    .legend { display: none; }
    .cal-weekday { padding: 8px 4px; font-size: 10px; }
    .cal-cell { padding: 4px; }
    .day-num { font-size: 11px; width: 22px; height: 22px; }
    .event { font-size: 10px; padding: 1px 4px; }
    .admin-panel { flex-wrap: wrap; }
    .admin-input { min-width: 0; }
  }

  /* ── 비고란 ── */
  .remarks-section {
    display: flex;
    border: 1px solid #999;
    background: #fff;
    flex-shrink: 0;
  }
  .remarks-label {
    width: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: #475569;
    background: #f1f5f9;
    border-right: 1px solid #999;
    flex-shrink: 0;
  }
  .remarks-right {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .remarks-toolbar {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
  }
  .remarks-toolbar.admin-active {
    display: flex;
  }
  .remarks-toolbar select {
    font-size: 11px;
    padding: 2px 4px;
    border: 1px solid #cbd5e1;
    border-radius: 4px;
    background: #fff;
    color: #334155;
    cursor: pointer;
    outline: none;
  }
  .remarks-size-group {
    display: flex;
    align-items: center;
    gap: 4px;
    border: 1px solid #cbd5e1;
    border-radius: 4px;
    background: #fff;
    padding: 0 6px;
    height: 26px;
  }
  .remarks-size-label {
    font-size: 11px;
    font-weight: 600;
    color: #334155;
    min-width: 30px;
    text-align: center;
  }
  .remarks-size-btns {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .remarks-size-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 12px;
    border: none;
    background: none;
    color: #64748b;
    font-size: 8px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }
  .remarks-size-btn:hover {
    color: #f97316;
  }
  .remarks-toolbar input[type="color"] {
    width: 24px;
    height: 24px;
    border: 1px solid #cbd5e1;
    border-radius: 4px;
    padding: 1px;
    cursor: pointer;
    background: #fff;
  }
  .remarks-fmt-btn {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #cbd5e1;
    border-radius: 4px;
    background: #fff;
    color: #334155;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .remarks-fmt-btn:hover {
    background: #e2e8f0;
  }
  .remarks-body {
    flex: 1;
    min-height: 48px;
    padding: 8px 12px;
    font-size: 12px;
    color: #334155;
    outline: none;
    cursor: text;
  }
  .remarks-body:focus {
    background: #fefce8;
  }

  /* ── 인쇄 버튼 ── */
  .print-btn {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 90;
    display: flex; align-items: center; gap: 8px;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--muted2);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all .2s;
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
  }
  .print-btn:hover {
    color: var(--text);
    border-color: var(--orange);
    background: var(--bg3);
    box-shadow: 0 6px 24px rgba(0,0,0,.5);
  }

  /* ── 인쇄 스타일 ── */
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

    body {
      overflow: visible !important;
      background: #fff !important;
      color: #111 !important;
    }
    body::before { display: none !important; }

    /* 숨길 요소 */
    nav, .error-banner, .admin-panel, .print-btn,
    .loading-overlay, .modal-overlay, .connect-indicator,
    #authNavWrapper, #authToast { display: none !important; }

    /* 툴바 인쇄 스타일 */
    .toolbar {
      background: #fff !important;
      border-bottom: 2px solid #333 !important;
      padding: 8px 0 !important;
      flex-wrap: wrap !important;
    }
    .toolbar .btn { display: none !important; }
    .toolbar-nav { display: none !important; }
    .toolbar-month {
      color: #111 !important;
      font-size: 24px !important;
    }
    .toolbar-month small { color: #666 !important; }
    .toolbar-center { color: #111 !important; font-size: 30px !important; font-weight: 900 !important; letter-spacing: .25em !important; }
    .toolbar-right {
      margin-left: auto !important;
    }
    .toolbar-right-inner {
      display: flex !important;
      flex-direction: column !important;
      align-items: flex-end !important;
      gap: 3px !important;
    }
    .legend { display: flex !important; font-size: 9px !important; gap: 8px !important; }
    .legend-dot { width: 6px !important; height: 6px !important; }
    .legend-item { gap: 3px !important; color: #333 !important; }
    .site-name-row { display: flex !important; align-items: center !important; }
    .site-name-label { color: #333 !important; font-size: 10px !important; font-weight: 700 !important; }
    .site-name-input {
      background: transparent !important;
      border: none !important;
      color: #111 !important;
      font-size: 10px !important;
      font-weight: 600 !important;
      padding: 0 !important;
      width: auto !important;
    }

    /* 캘린더 인쇄 스타일 */
    .calendar-wrap {
      overflow: visible !important;
      flex: none !important;
    }
    .cal-weekdays {
      background: #f5f5f5 !important;
      border-bottom: 2px solid #333 !important;
    }
    .cal-weekday { color: #333 !important; font-size: 11px !important; }
    .cal-weekday.sun { color: #dc2626 !important; }
    .cal-weekday.sat { color: #2563eb !important; }

    .cal-grid {
      height: auto !important;
    }
    .cal-cell {
      border-color: #ccc !important;
      min-height: 80px !important;
      background: #fff !important;
    }
    .cal-cell.other-month { opacity: .35 !important; }
    .cal-cell.today { background: #fff !important; }

    .day-num { color: #333 !important; }
    .cal-cell.sun .day-num { color: #dc2626 !important; }
    .cal-cell.sat .day-num { color: #2563eb !important; }
    .cal-cell.today .day-num {
      background: transparent !important;
      color: #333 !important;
    }

    .event {
      font-size: 9px !important;
      padding: 1px 4px !important;
      border-radius: 2px !important;
    }
    .event.cat-education  { background: #dbeafe !important; color: #1e40af !important; border-left: 2px solid #3b82f6 !important; }
    .event.cat-inspection { background: #dcfce7 !important; color: #166534 !important; border-left: 2px solid #22c55e !important; }
    .event.cat-report     { background: #fef9c3 !important; color: #854d0e !important; border-left: 2px solid #eab308 !important; }
    .event.cat-meeting    { background: #f3e8ff !important; color: #6b21a8 !important; border-left: 2px solid #a855f7 !important; }
    .event.cat-drill      { background: #ffedd5 !important; color: #9a3412 !important; border-left: 2px solid #f97316 !important; }

<!-- 비고란 -->
<div class="remarks-section">
  <div class="remarks-label">비고</div>
  <div class="remarks-right">
    <div class="remarks-toolbar">
      <div class="remarks-size-group">
        <span class="remarks-size-label" id="remarksSizeLabel">12px</span>
        <div class="remarks-size-btns">
          <button class="remarks-size-btn" onclick="remarksSizeUp()" title="크기 키우기">▲</button>
          <button class="remarks-size-btn" onclick="remarksSizeDown()" title="크기 줄이기">▼</button>
        </div>
      </div>
      <input type="color" id="remarksFontColor" value="#334155" onchange="remarksFormat('foreColor',this.value)" title="글꼴 색상">
      <button class="remarks-fmt-btn" onclick="remarksFormat('bold')" title="굵게"><b>B</b></button>
      <button class="remarks-fmt-btn" onclick="remarksFormat('italic')" title="기울임"><i>I</i></button>
      <button class="remarks-fmt-btn" onclick="remarksFormat('underline')" title="밑줄"><u>U</u></button>
    </div>
    <div class="remarks-body" id="remarksBody" contenteditable="false" oninput="saveRemarks()"></div>
  </div>
</div>



<!-- 인쇄 버튼 -->
<button class="print-btn" onclick="printWithGuide()">🖨️ 인쇄하기</button>

<!-- 이벤트 상세 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-cat-bar" id="modalCatBar"></div>
      <div>
        <div class="modal-title" id="modalTitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-info" id="modalInfo"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  ★ 설정 — 여기에 API Key와 캘린더 ID를 입력하세요 ★
// ══════════════════════════════════════════════════
const CONFIG = {
  GOOGLE_API_KEY: 'AIzaSyAycJXlAGR8ZQKtpqhH1JPML7BmeZzYOJE',
  GOOGLE_CAL_ID:  'ccaec7aed8a480f4581eb0c2c2bae94428fa8bc646fb97471256cedbc207dace@group.calendar.google.com',
};
// ══════════════════════════════════════════════════

let currentYear, currentMonth;
let cachedEvents = {};

const MONTHS_KR = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

const CATEGORY_MAP = {
  '교육': 'education', '안전교육': 'education', '신규자': 'education', '특별교육': 'education',
  '점검': 'inspection', '안전점검': 'inspection', '합동점검': 'inspection', '정기점검': 'inspection',
  '감리': 'inspection', '감수': 'inspection',
  '보고': 'report', '신고': 'report', '산재': 'report', '보고서': 'report', '제출': 'report',
  '안전관리비': 'report', '작성': 'report',
  '회의': 'meeting', '산안위': 'meeting', '협의체': 'meeting', '간담회': 'meeting',
  '공정회의': 'meeting', '품의': 'meeting',
  '훈련': 'drill', '소방': 'drill', '대피': 'drill', '비상': 'drill',
  '공휴일': 'holiday', '휴일': 'holiday', '대체공휴일': 'holiday',
};

const CAT_COLORS = {
  education: 'var(--blue)', inspection: 'var(--green)', report: 'var(--yellow)',
  meeting: 'var(--purple)', drill: 'var(--orange)', holiday: 'var(--red)',
  default: 'var(--cyan)',
};

// ── Google Calendar API ──
async function fetchGoogleEvents(year, month) {
  const key = `${year}-${month}`;
  if (cachedEvents[key]) return cachedEvents[key];

  const apiKey = CONFIG.GOOGLE_API_KEY;
  const calId = CONFIG.GOOGLE_CAL_ID;

  const timeMin = new Date(year, month, 1).toISOString();
  const timeMax = new Date(year, month + 1, 0, 23, 59, 59).toISOString();
  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events?` +
    `key=${apiKey}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime&maxResults=250`;

  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`API 오류: ${resp.status}`);
  const data = await resp.json();

  const events = (data.items || []).map(item => {
    const start = item.start.dateTime || item.start.date;
    const end = item.end.dateTime || item.end.date;
    const isAllDay = !item.start.dateTime;
    let timeStr = '종일';
    if (!isAllDay) {
      const s = new Date(start);
      const e = new Date(end);
      timeStr = `${String(s.getHours()).padStart(2,'0')}:${String(s.getMinutes()).padStart(2,'0')} - ${String(e.getHours()).padStart(2,'0')}:${String(e.getMinutes()).padStart(2,'0')}`;
    }
    return {
      title: item.summary || '(제목 없음)',
      date: isAllDay ? start : start.slice(0, 10),
      time: timeStr,
      location: item.location || '-',
      desc: item.description || '',
    };
  });

  cachedEvents[key] = events;
  return events;
}

// ── 카테고리 분류 ──
function classifyEvent(title) {
  for (const [keyword, cat] of Object.entries(CATEGORY_MAP)) {
    if (title.includes(keyword)) return cat;
  }
  return 'default';
}

// ── 연결 상태 표시 ──
function updateStatus(connected) {
  const el = document.getElementById('statusIndicator');
  if (connected) {
    el.innerHTML = '<div class="dot on"></div><span>Google Calendar 연결됨</span>';
  } else {
    el.innerHTML = '<div class="dot off"></div><span>연결 안됨</span>';
  }
}

function showError(msg) {
  // 에러 배너 대신 콘솔 로그 + 툴바 상태로 표시
  console.warn('[캘린더 오류]', msg);
  // 로딩 숨김
  const loading = document.getElementById('loading');
  if (loading) loading.classList.remove('show');
}

// ── 캘린더 렌더링 ──
async function renderCalendar() {
  const grid = document.getElementById('calGrid');
  const loading = document.getElementById('loading');

  document.getElementById('monthLabel').innerHTML =
    `${currentYear}년 ${MONTHS_KR[currentMonth]}` +
    `<small>${currentYear}.${String(currentMonth+1).padStart(2,'0')}</small>`;

  let events = [];
  const hasConfig = CONFIG.GOOGLE_API_KEY && CONFIG.GOOGLE_CAL_ID;

  loading.classList.add('show');
  if (hasConfig) {
    try {
      events = await fetchGoogleEvents(currentYear, currentMonth);
      updateStatus(true);
    } catch (err) {
      console.error(err);
      showError('Google Calendar 연결 실패: ' + err.message);
      updateStatus(false);
    }
  } else {
    updateStatus(false);
  }
  loading.classList.remove('show');

  // 날짜별 이벤트 매핑
  const eventsByDate = {};
  events.forEach(ev => {
    if (!eventsByDate[ev.date]) eventsByDate[ev.date] = [];
    eventsByDate[ev.date].push(ev);
  });

  // 그리드 계산
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const prevDays = new Date(currentYear, currentMonth, 0).getDate();

  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  let html = '';
  for (let i = 0; i < 42; i++) {
    const col = i % 7;
    let day, dateStr, isOther = false;

    if (i < firstDay) {
      day = prevDays - firstDay + 1 + i;
      const pm = currentMonth === 0 ? 12 : currentMonth;
      const py = currentMonth === 0 ? currentYear - 1 : currentYear;
      dateStr = `${py}-${String(pm).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      isOther = true;
    } else if (i >= firstDay + daysInMonth) {
      day = i - firstDay - daysInMonth + 1;
      const nm = currentMonth + 2 > 12 ? 1 : currentMonth + 2;
      const ny = currentMonth + 2 > 12 ? currentYear + 1 : currentYear;
      dateStr = `${ny}-${String(nm).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      isOther = true;
    } else {
      day = i - firstDay + 1;
      dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }

    const isToday = dateStr === todayStr;
    const isSun = col === 0;
    const isSat = col === 6;

    let classes = 'cal-cell';
    if (isOther) classes += ' other-month';
    if (isToday) classes += ' today';
    if (isSun) classes += ' sun';
    if (isSat) classes += ' sat';

    html += `<div class="${classes}">`;
    html += `<div class="day-num">${day}</div>`;
    html += `<div class="events">`;

    const dayEvents = eventsByDate[dateStr] || [];
    const maxShow = 3;
    dayEvents.slice(0, maxShow).forEach(ev => {
      const cat = classifyEvent(ev.title);
      html += `<div class="event cat-${cat}" onclick='showModal(${JSON.stringify(ev).replace(/'/g, "&#39;")})'>${ev.title}</div>`;
    });
    if (dayEvents.length > maxShow) {
      html += `<div class="more-events">+${dayEvents.length - maxShow}개 더보기</div>`;
    }
    html += `</div></div>`;
  }
  grid.innerHTML = html;
  loadRemarks();
}

// ── 네비게이션 ──
function goToday() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth();
  renderCalendar();
}
function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}
function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
}

// ── 모달 ──
function showModal(ev) {
  const cat = classifyEvent(ev.title);
  document.getElementById('modalCatBar').style.background = CAT_COLORS[cat];
  document.getElementById('modalTitle').textContent = ev.title;

  const infoHtml = `
    <div class="modal-info-row"><span class="modal-info-icon">📅</span><span>${ev.date} (${getDayName(ev.date)})</span></div>
    <div class="modal-info-row"><span class="modal-info-icon">🕐</span><span>${ev.time}</span></div>
    <div class="modal-info-row"><span class="modal-info-icon">📍</span><span>${ev.location}</span></div>
    ${ev.desc ? `<div style="margin-top:8px;padding-top:12px;border-top:1px solid var(--border);">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">상세 내용</div>
      <div style="font-size:13px;color:var(--text);line-height:1.7;">${ev.desc}</div>
    </div>` : ''}`;
  document.getElementById('modalInfo').innerHTML = infoHtml;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

// ── 인쇄 안내 팝업 ──
function printWithGuide() {
  const msg = '📋 인쇄 배율 권장 설정 안내\n\n' +
    '• A4 용지: 배율 95%\n' +
    '• A3 용지: 배율 135%\n\n' +
    '인쇄 설정에서 위 배율을 적용해 주세요.\n' +
    '확인을 누르면 인쇄 화면으로 이동합니다.';
  if (confirm(msg)) {
    var t = document.title;
    document.title = ' ';
    setTimeout(function() {
      window.print();
      setTimeout(function() { document.title = t; }, 500);
    }, 200);
  }
}

// ── 비고란 서식 ──
function remarksFormat(cmd, val) {
  document.getElementById('remarksBody').focus();
  document.execCommand(cmd, false, val || null);
  saveRemarks();
}

const REMARK_SIZES = [10, 12, 14, 16, 18, 24];
let remarkSizeIndex = 1; // default 12px

function remarksSizeUp() {
  if (remarkSizeIndex < REMARK_SIZES.length - 1) {
    remarkSizeIndex++;
    const sizeVal = REMARK_SIZES.indexOf(REMARK_SIZES[remarkSizeIndex]) + 1; // fontSize command uses 1-7
    document.getElementById('remarksSizeLabel').textContent = REMARK_SIZES[remarkSizeIndex] + 'px';
    remarksFormat('fontSize', remarkSizeIndex + 1);
  }
}
function remarksSizeDown() {
  if (remarkSizeIndex > 0) {
    remarkSizeIndex--;
    document.getElementById('remarksSizeLabel').textContent = REMARK_SIZES[remarkSizeIndex] + 'px';
    remarksFormat('fontSize', remarkSizeIndex + 1);
  }
}

// ── 비고란 월별 저장/불러오기 ──
function getRemarksKey() {
  return `remarks_${currentYear}_${currentMonth}`;
}
function saveRemarks() {
  const html = document.getElementById('remarksBody').innerHTML;
  localStorage.setItem(getRemarksKey(), html);
}
function loadRemarks() {
  const html = localStorage.getItem(getRemarksKey()) || '';
  document.getElementById('remarksBody').innerHTML = html;
}

// ── 현장명 저장/불러오기 ──
function saveSiteName() {
  localStorage.setItem('site_name', document.getElementById('siteNameInput').value);
}
function loadSiteName() {
  document.getElementById('siteNameInput').value = localStorage.getItem('site_name') || '';
}
function getDayName(dateStr) { return ['일','월','화','수','목','금','토'][new Date(dateStr).getDay()]; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── 관리자 패널: 설정 저장 ──
function saveConfig() {
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  const calId = document.getElementById('calIdInput').value.trim();
  if (!apiKey || !calId) { alert('API Key와 캘린더 ID를 모두 입력해주세요.'); return; }

  // CONFIG 업데이트 + localStorage에 저장 (모든 접속자 공유)
  CONFIG.GOOGLE_API_KEY = apiKey;
  CONFIG.GOOGLE_CAL_ID = calId;
  localStorage.setItem('cal_api_key', apiKey);
  localStorage.setItem('cal_cal_id', calId);

  // 패널 숨기기
  document.getElementById('adminPanel').classList.remove('show');

  // 캐시 초기화 후 다시 렌더링
  cachedEvents = {};
  renderCalendar();

  if (typeof AUTH !== 'undefined') AUTH.showMsg('✅ 캘린더 설정이 저장되었습니다');
}

// ── 설정 아이콘 토글 ──
function toggleAdminPanel() {
  const panel = document.getElementById('adminPanel');
  const isVisible = panel.classList.contains('show');
  if (isVisible) {
    panel.classList.remove('show');
  } else {
    panel.classList.add('show');
    if (CONFIG.GOOGLE_API_KEY) document.getElementById('apiKeyInput').value = CONFIG.GOOGLE_API_KEY;
    if (CONFIG.GOOGLE_CAL_ID) document.getElementById('calIdInput').value = CONFIG.GOOGLE_CAL_ID;
  }
}

// ── 관리자 상태에 따른 UI 업데이트 ──
function updateAdminUI() {
  const isAdmin = typeof AUTH !== 'undefined' && AUTH.isAdmin();
  const settingsBtn = document.getElementById('settingsBtn');
  const remarksBody = document.getElementById('remarksBody');
  const remarksToolbar = document.querySelector('.remarks-toolbar');
  const siteNameInput = document.getElementById('siteNameInput');

  if (isAdmin) {
    settingsBtn.classList.add('show');
    remarksBody.contentEditable = 'true';
    remarksToolbar.classList.add('admin-active');
    siteNameInput.disabled = false;
  } else {
    settingsBtn.classList.remove('show');
    document.getElementById('adminPanel').classList.remove('show');
    remarksBody.contentEditable = 'false';
    remarksToolbar.classList.remove('admin-active');
    siteNameInput.disabled = true;
  }
}

// ── auth.js 연동 콜백 ──
window.onAdminLogin = function() { updateAdminUI(); };
window.onAdminLogout = function() { updateAdminUI(); };
window.onAuthStateChange = function() { updateAdminUI(); };

// ── 초기화 ──
// localStorage에서 저장된 설정 불러오기 (코드에 직접 입력한 값 우선)
if (!CONFIG.GOOGLE_API_KEY) CONFIG.GOOGLE_API_KEY = localStorage.getItem('cal_api_key') || '';
if (!CONFIG.GOOGLE_CAL_ID) CONFIG.GOOGLE_CAL_ID = localStorage.getItem('cal_cal_id') || '';

const now = new Date();
currentYear = now.getFullYear();
currentMonth = now.getMonth();
renderCalendar();
updateAdminUI();
loadSiteName();
</script>
</body>
</html>
