// ── 평행사변형 도형 주입 (JSZip 포스트 프로세싱) ──
async function injectParallelograms(buf, totalCols, gridCols) {
  if (typeof JSZip === 'undefined') return buf;
  const zip = await JSZip.loadAsync(buf);

  // 도형 XML: 네이비 평행사변형(좌) + 초록 평행사변형(우)
  // 위치: row0 내 하단 (y offset 381000 EMU), 높이 45719 EMU
  // 2열 기준: 좌 col0~7, 우 col8
  // totalCols로 우측 열 인덱스 조정
  const rightCol = totalCols - 1;
  const shapeXml = `<xdr:twoCellAnchor><xdr:from><xdr:col>0</xdr:col><xdr:colOff>0</xdr:colOff><xdr:row>0</xdr:row><xdr:rowOff>381000</xdr:rowOff></xdr:from><xdr:to><xdr:col>${rightCol - 1}</xdr:col><xdr:colOff>353431</xdr:colOff><xdr:row>0</xdr:row><xdr:rowOff>426719</xdr:rowOff></xdr:to><xdr:sp macro="" textlink=""><xdr:nvSpPr><xdr:cNvPr id="98" name="shape_navy"/><xdr:cNvSpPr/></xdr:nvSpPr><xdr:spPr><a:xfrm><a:off x="0" y="381000"/><a:ext cx="4932000" cy="45719"/></a:xfrm><a:prstGeom prst="parallelogram"><a:avLst/></a:prstGeom><a:solidFill><a:srgbClr val="014099"/></a:solidFill><a:ln><a:noFill/></a:ln><a:effectLst/></xdr:spPr><xdr:style><a:lnRef idx="1"><a:schemeClr val="accent1"/></a:lnRef><a:fillRef idx="3"><a:schemeClr val="accent1"/></a:fillRef><a:effectRef idx="2"><a:schemeClr val="accent1"/></a:effectRef><a:fontRef idx="minor"><a:schemeClr val="lt1"/></a:fontRef></xdr:style><xdr:txBody><a:bodyPr rtlCol="0" anchor="ctr"/><a:lstStyle/><a:p><a:pPr algn="l"/><a:endParaRPr lang="ko-KR" sz="1100"/></a:p></xdr:txBody></xdr:sp><xdr:clientData/></xdr:twoCellAnchor><xdr:twoCellAnchor><xdr:from><xdr:col>${rightCol}</xdr:col><xdr:colOff>6569</xdr:colOff><xdr:row>0</xdr:row><xdr:rowOff>381000</xdr:rowOff></xdr:from><xdr:to><xdr:col>${rightCol}</xdr:col><xdr:colOff>1122569</xdr:colOff><xdr:row>0</xdr:row><xdr:rowOff>426719</xdr:rowOff></xdr:to><xdr:sp macro="" textlink=""><xdr:nvSpPr><xdr:cNvPr id="99" name="shape_green"/><xdr:cNvSpPr/></xdr:nvSpPr><xdr:spPr><a:xfrm flipV="1"><a:off x="4939862" y="381000"/><a:ext cx="1116000" cy="45719"/></a:xfrm><a:prstGeom prst="parallelogram"><a:avLst/></a:prstGeom><a:solidFill><a:srgbClr val="00B050"/></a:solidFill><a:ln><a:noFill/></a:ln><a:effectLst/></xdr:spPr><xdr:style><a:lnRef idx="1"><a:schemeClr val="accent1"/></a:lnRef><a:fillRef idx="3"><a:schemeClr val="accent1"/></a:fillRef><a:effectRef idx="2"><a:schemeClr val="accent1"/></a:effectRef><a:fontRef idx="minor"><a:schemeClr val="lt1"/></a:fontRef></xdr:style><xdr:txBody><a:bodyPr rtlCol="0" anchor="ctr"/><a:lstStyle/><a:p><a:pPr algn="l"/><a:endParaRPr lang="ko-KR" sz="1100"/></a:p></xdr:txBody></xdr:sp><xdr:clientData/></xdr:twoCellAnchor>`;

  const pages = wb ? wb.worksheets.length : 1;

  for (const wsName of zip.folder('xl/worksheets') ? [] : []) {} // dummy

  // drawing 파일 찾아서 수정
  const drawingPath = 'xl/drawings/drawing1.xml';
  if (zip.file(drawingPath)) {
    let xml = await zip.file(drawingPath).async('string');
    xml = xml.replace('</xdr:wsDr>', shapeXml + '</xdr:wsDr>');
    zip.file(drawingPath, xml);
  } else {
    // drawing 파일이 없으면 새로 생성 및 관계 파일 추가
    const fullXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\r\n<xdr:wsDr xmlns:xdr="http://schemas.openxmlformats.org/drawingml/2006/spreadsheetDrawing" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">${shapeXml}</xdr:wsDr>`;
    zip.file(drawingPath, fullXml);
    // _rels
    const relsPath = 'xl/drawings/_rels/drawing1.xml.rels';
    if (!zip.file(relsPath)) {
      zip.file(relsPath, `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\r\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>`);
    }
    // sheet1.xml에 drawing 관계 추가
    const sheetPath = 'xl/worksheets/sheet1.xml';
    if (zip.file(sheetPath)) {
      let sheetXml = await zip.file(sheetPath).async('string');
      if (!sheetXml.includes('drawing r:id')) {
        sheetXml = sheetXml.replace('</worksheet>', '<drawing xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" r:id="rId_drawing1"/></worksheet>');
        zip.file(sheetPath, sheetXml);
      }
    }
  }

  return await zip.generateAsync({type:'arraybuffer', compression:'DEFLATE', compressionOptions:{level:6}});
}

async function saveExcel() {
  if (typeof ExcelJS === 'undefined') { toast('ExcelJS 라이브러리 로딩 중... 잠시 후 다시 시도'); return; }
  toast('엑셀 파일 생성 중...');

  try {
    const wb = new ExcelJS.Workbook();
    wb.creator = '사진대지';
    wb.created = new Date();

    const title = document.getElementById('docTitle').value || '사진대지';
    const site = document.getElementById('siteName').value || '';

    if (currentTemplate === 'id-cert') {
      await buildIdCertExcel(wb, title, site);
    } else {
      await buildDefaultExcel(wb, title, site);
    }

    let buf = await wb.xlsx.writeBuffer();
    // ── 도형(평행사변형) 주입 ──

    const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${title.replace(/[\\/:*?"<>|]/g,'_')}.xlsx`;
    a.click();
    URL.revokeObjectURL(url);
    toast('엑셀 저장 완료');
  } catch(e) {
    console.error(e);
    toast('엑셀 저장 실패: ' + e.message);
  }
}

// ── 공통 유틸 ──
const thinBorder = {style:'thin', color:{argb:'FF222222'}};
const allBorders = {top:thinBorder, bottom:thinBorder, left:thinBorder, right:thinBorder};
function setCell(ws, r, c, val, opts={}) {
  const cell = ws.getCell(r, c);
  cell.value = val;
  cell.font = {name:'맑은 고딕', size: opts.size||10, bold:!!opts.bold, color:{argb:opts.color||'FF111111'}};
  cell.alignment = {horizontal:opts.align||'center', vertical:opts.va||'middle', wrapText:!!opts.wrap};
  if (opts.border !== false) cell.border = allBorders;
  if (opts.fill) cell.fill = {type:'pattern', pattern:'solid', fgColor:{argb:opts.fill}};
  return cell;
}
function mergeFill(ws, r1, c1, r2, c2, val, opts={}) {
  ws.mergeCells(r1, c1, r2, c2);
  setCell(ws, r1, c1, val, opts);
}
async function addImg(wb, ws, b64, r1, c1, r2, c2) {
  if (!b64 || !b64.startsWith('data:image')) return;
  try {
    const ext = b64.startsWith('data:image/png') ? 'png' : 'jpeg';
    const raw = b64.split(',')[1];
    const imgId = wb.addImage({base64: raw, extension: ext});
    // 테두리 안쪽 95% — 각 방향 ~5% 여백 (190500 EMU ≈ 20px)
    const PAD = 190500;
    ws.addImage(imgId, {
      tl: {col: c1-1, row: r1-1, nativeColOff: PAD, nativeRowOff: PAD},
      br: {col: c2,   row: r2,   nativeColOff: -PAD, nativeRowOff: -PAD},
      editAs: 'oneCell'
    });
  } catch(e) { console.warn('이미지 삽입 실패:', e); }
}

// ── 기본 양식 엑셀 ──
async function buildDefaultExcel(wb, title, site) {
  const isLand   = pageOrientation === 'landscape';
  const gridCols = isLand ? (slotCount >= 6 ? 3 : 2) : (slotCount <= 2 ? 1 : 2);

  // ── 스타일 상수 (타겟 파일 기준) ──
  const THIN  = {style:'thin',  color:{argb:'FF222222'}};
  const allBd = {top:THIN, bottom:THIN, left:THIN, right:THIN};
  const lrBd  = {left:THIN, right:THIN}; // 구분자 열용

  // ── 라벨 셀 적용 ──
  function applyLbl(cell, val, noTop=false) {
    cell.value = val;
    cell.font      = {name:'맑은 고딕', size:7.5, bold:true, color:{argb:'FF444444'}};
    cell.alignment = {horizontal:'center', vertical:'middle'};
    cell.fill      = {type:'pattern', pattern:'solid', fgColor:{argb:'FFFFFFFF'}};
    cell.border    = noTop
      ? {bottom:THIN, left:THIN, right:THIN}
      : allBd;
  }
  // ── 값 셀 적용 ──
  function applyVal(cell, val, noTop=false) {
    cell.value = val ?? '';
    cell.font      = {name:'맑은 고딕', size:8.3, color:{argb:'FF111111'}};
    cell.alignment = {horizontal:'left', vertical:'middle', wrapText:true};
    cell.border    = noTop
      ? {bottom:THIN, left:THIN, right:THIN}
      : allBd;
  }
  // ── 사진 영역 셀 적용 ──
  function applyPhoto(cell) {
    cell.fill   = {type:'pattern', pattern:'solid', fgColor:{argb:'FFF5F5F5'}};
    cell.border = allBd;
  }
  // ── 구분자 열: 완전 빈 공간 (테두리/스타일 없음) ──
  function applyDivider(cell) {
    // intentionally empty - divider column has no styling
  }

  // ── 열 너비 정의 ──
  // 2열: [라벨4.62 | 값15 | 라벨4.62 | 값15 | 구분자1.12 | 라벨4.62 | 값15 | 라벨4.62 | 값15]
  // 1열: [라벨5 | 값20 | 라벨5 | 값20]
  // 3열(가로): [라벨4 | 값10 | 라벨4 | 값10 | 구분자1 | 라벨4 | 값10 | 라벨4 | 값10 | 구분자1 | 라벨4 | 값10 | 라벨4 | 값10]
  let colDefs;
  if (gridCols === 1) {
    colDefs = [{width:5},{width:20},{width:5},{width:20}];
  } else if (gridCols === 2) {
    colDefs = [
      {width:4.62},{width:15},{width:4.62},{width:15},
      {width:1.12},
      {width:4.62},{width:15},{width:4.62},{width:15}
    ];
  } else { // 3열 (가로)
    colDefs = [
      {width:4},{width:10},{width:4},{width:10},
      {width:1},
      {width:4},{width:10},{width:4},{width:10},
      {width:1},
      {width:4},{width:10},{width:4},{width:10}
    ];
  }

  // 슬롯 그룹에서의 시작 열 인덱스 (1-based)
  // 1열: group0 → col1
  // 2열: group0 → col1, group1 → col6 (구분자 col5)
  // 3열: group0 → col1, group1 → col6, group2 → col11 (구분자 col5,col10)
  function groupStartCol(gIdx) {
    if (gridCols === 1) return 1;
    if (gridCols === 2) return gIdx === 0 ? 1 : 6;
    return [1, 6, 11][gIdx];
  }
  function dividerCols() {
    if (gridCols === 2) return [5];
    if (gridCols === 3) return [5, 10];
    return [];
  }
  const totalCols = colDefs.length;

  // ── 행 높이 상수 (타겟 파일 기준) ──
  const PHOTO_ROW_H = 21.95;
  const PHOTO_ROWS  = 9;
  const META1_H     = 17.1;
  const META2_H     = 21.0;
  const GAP_H       = 8.1;
  const TITLE_H     = 36;
  const LINE_H      = 3;

  for (let pi = 0; pi < pages.length; pi++) {
    const pg = pages[pi];
    ensureSlots(pg);
    const wsName = pages.length > 1 ? `${pi+1}페이지` : '사진대지';
    const ws = wb.addWorksheet(wsName, {
      pageSetup: {
        paperSize: 9,
        orientation: isLand ? 'landscape' : 'portrait',
        fitToPage: true, fitToWidth: 1, fitToHeight: 1,
        margins: {top:0.39, bottom:0.39, left:0.5, right:0.5, header:0.2, footer:0.2}
      }
    });
    ws.views = [{showGridLines: false}];
    ws.columns = colDefs;

    const slots = pg.slots;
    let row = 1;

    // ── Row 1: 제목 ──
    ws.mergeCells(row, 1, row, totalCols);
    const titleCell = ws.getCell(row, 1);
    titleCell.value     = title;
    titleCell.font      = {name:'맑은 고딕', size:16, bold:true, color:{argb:'FF002060'}};
    titleCell.alignment = {horizontal:'left', vertical:'middle'};
    ws.getRow(row).height = TITLE_H;
    row++;

    // ── Row 2: 파란 구분선 (구분자 열 제외) ──
    const divCols = new Set(dividerCols());
    for (let c = 1; c <= totalCols; c++) {
      if (divCols.has(c)) continue;
      ws.getCell(row, c).border = {bottom:{style:'medium', color:{argb:'FF002060'}}};
    }
    ws.getRow(row).height = LINE_H;
    row++;

    // ── 슬롯 렌더링 ──
    const rowGroups = Math.ceil(slots.length / gridCols);
    for (let gi = 0; gi < rowGroups; gi++) {
      const sr = row;

      // 사진 행들 높이 설정
      for (let pr = sr; pr < sr + PHOTO_ROWS; pr++) {
        ws.getRow(pr).height = PHOTO_ROW_H;
      }

      // 구분자 열: 사진행 + 메타행에 좌우 선만
      for (const dc of dividerCols()) {
        for (let pr = sr; pr < sr + PHOTO_ROWS + 2; pr++) {
          applyDivider(ws.getCell(pr, dc));
        }
      }

      for (let gIdx = 0; gIdx < gridCols; gIdx++) {
        const si   = gi * gridCols + gIdx;
        if (si >= slots.length) break;
        const d    = slots[si];
        const c1   = groupStartCol(gIdx);

        // ── 사진 영역 병합 ──
        ws.mergeCells(sr, c1, sr + PHOTO_ROWS - 1, c1 + 3);
        const pc = ws.getCell(sr, c1);
        applyPhoto(pc);
        // 슬롯 번호
        pc.value     = (pi * slotCount) + si + 1;
        pc.font      = {name:'맑은 고딕', size:9, color:{argb:'FFCCCCCC'}};
        pc.alignment = {horizontal:'left', vertical:'top'};

        // 사진 이미지
        if (d.img) await addImg(wb, ws, d.img, sr, c1, sr + PHOTO_ROWS - 1, c1 + 3);

        // ── 메타행 1: 위치라벨 | 위치값 | 일시라벨 | 일시값 ──
        const mr1 = sr + PHOTO_ROWS;
        const noTop = (gi === 0);
        applyLbl(ws.getCell(mr1, c1),   d.locLbl  || '위치', noTop);
        applyVal(ws.getCell(mr1, c1+1), d.loc     || '',     noTop);
        applyLbl(ws.getCell(mr1, c1+2), d.dateLbl || '일시', noTop);
        applyVal(ws.getCell(mr1, c1+3), d.date    || '',     noTop);

        // ── 메타행 2: 내용라벨 | 내용값(3열 병합) ──
        const mr2 = sr + PHOTO_ROWS + 1;
        applyLbl(ws.getCell(mr2, c1), d.descLbl || '내용');
        ws.mergeCells(mr2, c1+1, mr2, c1+3);
        applyVal(ws.getCell(mr2, c1+1), d.desc || '');
      }

      ws.getRow(sr + PHOTO_ROWS    ).height = META1_H;
      ws.getRow(sr + PHOTO_ROWS + 1).height = META2_H;

      row = sr + PHOTO_ROWS + 2;

      // 모든 그룹 뒤 간격행 추가 (마지막 포함)
      ws.getRow(row).height = GAP_H;
      row++;
    }
    // ── 현장명 푸터 ──
    ws.mergeCells(row, 1, row, totalCols);
    const footerCell = ws.getCell(row, 1);
    footerCell.value     = `현장명 : ${site || ''}`;
    footerCell.font      = {name:'맑은 고딕', size:11};
    footerCell.alignment = {horizontal:'right', vertical:'middle'};
  }
}

// ── 신분증/이수증 양식 엑셀 ──
async function buildIdCertExcel(wb, title, site) {
  for (let pi = 0; pi < pages.length; pi++) {
    const pg = pages[pi];
    ensureSlotsIdCert(pg);
    const meta = pg.idCertMeta || {};
    const wsName = pages.length > 1 ? `${pi+1}페이지` : '신분증이수증';
    const ws = wb.addWorksheet(wsName, {
      pageSetup: {paperSize:9, orientation:'portrait', fitToPage:true, margins:{top:0.4,bottom:0.4,left:0.5,right:0.5,header:0.2,footer:0.2}}
    });

    // A=No(4), B~F=신분증(30), G~K=이수증(30), L=성명(8), M=비고(8)
    ws.columns = [
      {width:4},  // A: No.
      {width:30}, // B: 신분증
      {width:30}, // C: 이수증
      {width:12}, // D: 성명
      {width:12}, // E: 비고
    ];

    let row = 1;

    // 타이틀
    mergeFill(ws, row, 1, row, 5, title, {size:14, bold:true, color:'FF002060'});
    ws.getRow(row).height = 34;
    row++;

    // 공사명 / 업체명
    setCell(ws, row, 1, '공사명', {size:9, bold:true, fill:'FFE8E8E8'});
    mergeFill(ws, row, 2, row, 3, meta.projectName || site || '', {size:10, align:'left'});
    setCell(ws, row, 4, '업체명', {size:9, bold:true, fill:'FFE8E8E8'});
    setCell(ws, row, 5, meta.company || '', {size:10, align:'left'});
    ws.getRow(row).height = 22;
    row++;

    // 채용일자 / 인원
    setCell(ws, row, 1, '채용일자', {size:9, bold:true, fill:'FFE8E8E8'});
    mergeFill(ws, row, 2, row, 3, meta.hireDate || '', {size:10, align:'left'});
    setCell(ws, row, 4, '인원', {size:9, bold:true, fill:'FFE8E8E8'});
    setCell(ws, row, 5, meta.headcount || '', {size:10, align:'left'});
    ws.getRow(row).height = 22;
    row++;

    // 컬럼 헤더
    setCell(ws, row, 1, 'No.', {size:9, bold:true, fill:'FFE8E8E8'});
    setCell(ws, row, 2, meta.colHdr1 || '신분증', {size:9, bold:true, fill:'FFE8E8E8'});
    setCell(ws, row, 3, meta.colHdr2 || '건설업 기초안전보건교육 이수증', {size:9, bold:true, fill:'FFE8E8E8', wrap:true});
    setCell(ws, row, 4, '성명', {size:9, bold:true, fill:'FFE8E8E8'});
    setCell(ws, row, 5, '비고', {size:9, bold:true, fill:'FFE8E8E8'});
    ws.getRow(row).height = 28;
    row++;

    // 슬롯
    for (let si = 0; si < pg.slots.length; si++) {
      const d = pg.slots[si];
      const imgRows = 4; // 이미지 높이
      const startRow = row;

      // No.
      mergeFill(ws, startRow, 1, startRow + imgRows - 1, 1, si + 1 + (pi * slotCount), {size:10, bold:true});

      // 신분증 이미지
      mergeFill(ws, startRow, 2, startRow + imgRows - 1, 2, '', {fill:'FFF5F5F5'});
      if (d.img1) await addImg(wb, ws, d.img1, startRow, 2, startRow + imgRows - 1, 2);

      // 이수증 이미지
      mergeFill(ws, startRow, 3, startRow + imgRows - 1, 3, '', {fill:'FFF5F5F5'});
      if (d.img2) await addImg(wb, ws, d.img2, startRow, 3, startRow + imgRows - 1, 3);

      // 성명
      mergeFill(ws, startRow, 4, startRow + imgRows - 1, 4, `${d.nameLbl||'성명 :'} ${d.name||''}`, {size:10, wrap:true});

      // 비고
      mergeFill(ws, startRow, 5, startRow + imgRows - 1, 5, `${d.noteLbl||'비고 :'} ${d.note||''}`, {size:10, wrap:true});

      for (let ir = startRow; ir < startRow + imgRows; ir++) ws.getRow(ir).height = 40;
      row = startRow + imgRows;
    }
  }
}

let photoQueue = []; // {dataUrl, name}

function updateSideStat() {
  let total, filled;
  if (currentTemplate === 'id-cert') {
    total = pages.reduce((s,p)=>s+p.slots.length*2,0); // 각 슬롯에 2장
    filled = pages.reduce((s,p)=>s+p.slots.filter(d=>d.img1).length+p.slots.filter(d=>d.img2).length,0);
  } else {
    total = pages.reduce((s,p)=>s+p.slots.length,0);
    filled = pages.reduce((s,p)=>s+p.slots.filter(d=>d.img).length,0);
  }
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-filled').textContent = filled;
  document.getElementById('stat-queue').textContent = photoQueue.length;
  document.getElementById('spQlbl').textContent = `대기 사진 (${photoQueue.length})`;
  const btn = document.getElementById('spAssignBtn');
  btn.disabled = photoQueue.length === 0;
}

function addToQueue(files) {
  const remaining = [...files];
  function readNext() {
    if (!remaining.length) { renderQueue(); updateSideStat(); return; }
    const file = remaining.shift();
    const r = new FileReader();
    r.onload = ev => {
      photoQueue.push({dataUrl: ev.target.result, name: file.name});
      readNext();
    };
    r.readAsDataURL(file);
  }
  readNext();
}

function getEmptySlots() {
  const slots = [];
  if (currentTemplate === 'id-cert') {
    for (let pi=0; pi<pages.length; pi++) {
      for (let si=0; si<pages[pi].slots.length; si++) {
        const d = pages[pi].slots[si];
        if (!d.img1) slots.push({pi, si, key:'img1', global: slots.length+1, label:'신분증'});
        if (!d.img2) slots.push({pi, si, key:'img2', global: slots.length+1, label:'이수증'});
      }
    }
  } else {
    for (let pi=0; pi<pages.length; pi++) {
      for (let si=0; si<pages[pi].slots.length; si++) {
        if (!pages[pi].slots[si].img) slots.push({pi, si, global: slots.length+1});
      }
    }
  }
  return slots;
}
function renderQueue() {
  const ul = document.getElementById('spQueue');
  ul.innerHTML = '';
  const emptySlots = getEmptySlots();
  photoQueue.forEach((item, idx) => {
    const li = document.createElement('li'); li.className='sp-qitem';
    li.draggable = true;
    li.dataset.idx = idx;
    const img = document.createElement('img'); img.src = item.dataUrl;
    const name = document.createElement('span'); name.className='sp-qitem-name'; name.textContent = item.name;
    // 배치될 슬롯 정보
    const badge = document.createElement('div');
    if (idx < emptySlots.length) {
      const s = emptySlots[idx];
      const pageLabel = pages.length > 1 ? `P${s.pi+1}-` : '';
      badge.className = 'sp-qitem-badge';
      badge.textContent = s.label ? `${pageLabel}${s.si+1}-${s.label}` : `${pageLabel}${s.si+1}번`;
    } else {
      badge.className = 'sp-qitem-badge empty';
      badge.textContent = '미배치';
    }
    const del = document.createElement('button'); del.className='sp-qitem-del'; del.textContent='×';
    del.onclick = e => { e.stopPropagation(); photoQueue.splice(idx,1); renderQueue(); updateSideStat(); };
    li.append(img, badge, name, del);
    // 드래그 순서 변경
    li.addEventListener('dragstart', e => { e.dataTransfer.setData('queue-idx', idx); e.dataTransfer.setData('text/plain', 'queue'); li.style.opacity='.4'; });
    li.addEventListener('dragend', () => li.style.opacity='1');
    li.addEventListener('dragover', e => {
      if (e.dataTransfer.types.includes('queue-idx')) { e.preventDefault(); li.classList.add('drag-over'); }
    });
    li.addEventListener('dragleave', () => li.classList.remove('drag-over'));
    li.addEventListener('drop', e => {
      e.preventDefault(); li.classList.remove('drag-over');
      const from = +e.dataTransfer.getData('queue-idx');
      const to = idx;
      if (isNaN(from) || from === to) return;
      const [moved] = photoQueue.splice(from, 1); photoQueue.splice(to, 0, moved);
      renderQueue();
    });
    ul.appendChild(li);
  });
}

function assignQueue() {
  if (!photoQueue.length) return;
  saveUndo();
  let qi = 0;
  if (currentTemplate === 'id-cert') {
    for (const pg of pages) {
      for (const slot of pg.slots) {
        if (!slot.img1 && qi < photoQueue.length) { slot.img1 = photoQueue[qi].dataUrl; qi++; }
        if (!slot.img2 && qi < photoQueue.length) { slot.img2 = photoQueue[qi].dataUrl; qi++; }
      }
    }
  } else {
    for (const pg of pages) {
      for (const slot of pg.slots) {
        if (!slot.img && qi < photoQueue.length) { slot.img = photoQueue[qi].dataUrl; qi++; }
      }
    }
  }
  photoQueue.splice(0, qi);
  renderQueue(); renderAll(); updateSideStat();
  toast(`${qi}장 배치 완료`);
}

function getSaveKey() {
  const p = AUTH.isUser() ? AUTH.getUserProfile() : (AUTH.isAdmin() ? AUTH.getProfile() : null);
  if (!p || !p.email) return null;
  return 'pb_saves_' + p.email.replace(/[^a-zA-Z0-9]/g,'_');
}
function loadSaves() {
  const key = getSaveKey(); if (!key) return [];
  try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; }
}
function writeSaves(list) {
  const key = getSaveKey(); if (!key) return;
  localStorage.setItem(key, JSON.stringify(list));
}

function renderSavePanel() {
  const body = document.getElementById('savePanelBody');
  const btn  = document.getElementById('spSaveBtn');
  if (!body) return;
  const loggedIn = (typeof AUTH !== "undefined") && AUTH.isLoggedIn();
  btn.disabled = !loggedIn;
  if (!loggedIn) {
    body.innerHTML = `<div class="sp-login-prompt">
      🔒 로그인하면<br>양식을 저장하고<br>언제든 불러올 수 있습니다.
      <button class="sp-login-prompt-btn" onclick="AUTH.toggleUserDropdown()">구글로 로그인</button>
    </div>`;
    return;
  }
  const saves = loadSaves();
  if (!saves.length) {
    body.innerHTML = '<div class="sp-empty">저장된 양식이 없습니다.<br>+ 저장 버튼을 눌러<br>현재 양식을 저장하세요.</div>';
  } else {
    body.innerHTML = '';
    const ul = document.createElement('div'); ul.className = 'sp-list';
    saves.forEach((s, idx) => {
      const item = document.createElement('div');
      item.className = 'sp-item' + (s.active ? ' active' : '');
      item.innerHTML = `
        <div class="sp-item-name">${s.name}</div>
        <div class="sp-item-meta">${s.date} · ${s.pages}페이지</div>
        <button class="sp-item-del" onclick="deleteSave(${idx},event)" title="삭제">×</button>`;
      item.addEventListener('click', () => loadSave(idx));
      ul.appendChild(item);
    });

  }
  // 새 양식 버튼
  const nb = document.createElement('button'); nb.className='sp-new-btn'; nb.textContent='+ 새 양식 시작';
  nb.onclick = () => { resetForm(); };
  body.appendChild(nb);
}

function showLoginRequired() {
  let el = document.getElementById('loginRequiredToast');
  if (!el) {
    el = document.createElement('div');

      <button onclick="hideLoginRequired();try{AUTH.toggleUserDropdown();}catch(e){}" style="width:100%;padding:9px;border-radius:7px;background:#3b82f6;border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-bottom:7px">구글로 로그인</button>

function hideLoginRequired() {

function openSaveModal() {
  try {
    if (typeof AUTH === 'undefined' || !AUTH.isLoggedIn()) { showLoginRequired(); return; }
  } catch(e) { showLoginRequired(); return; }
  const site = document.getElementById('siteName').value || '';
  const inp = document.getElementById('saveModalInp');
  const modal = document.getElementById('saveModal');
  if (!inp || !modal) { toast('저장 모달을 찾을 수 없습니다'); return; }
  inp.value = site || '';
  modal.classList.add('open');
  inp.focus();
}
function closeSaveModal() { document.getElementById('saveModal').classList.remove('open'); }



function confirmSave() {
  const name = document.getElementById('saveModalInp').value.trim();
  if (!name) { document.getElementById('saveModalInp').focus(); return; }
  const saves = loadSaves();
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  // pages 직렬화 (이미지는 base64 그대로)
  const snapshot = JSON.parse(JSON.stringify(pages));
  const entry = {
    name, date: dateStr, pages: snapshot.length,
    siteName: document.getElementById('siteName').value,
    docTitle: document.getElementById('docTitle').value,
    slotCount, showPN, showSite,
    template: currentTemplate,
    orientation: pageOrientation,
    data: snapshot,
    id: Date.now()
  };
  saves.unshift(entry);
  if (saves.length > 30) saves.splice(30); // 최대 30개
  writeSaves(saves);
  closeSaveModal();
  renderSavePanel();
  toast(`"${name}" 저장됨`);
}

function loadSave(idx) {
  const saves = loadSaves();
  const entry = saves[idx]; if (!entry) return;
  saveUndo();
  pages.length = 0;
  entry.data.forEach(pg => pages.push(pg));
  slotCount = entry.slotCount || 6;
  showPN = entry.showPN ?? true;
  showSite = entry.showSite ?? true;
  currentTemplate = entry.template || 'default';
  pageOrientation = entry.orientation || 'portrait';
  document.getElementById('siteName').value = entry.siteName || '';
  document.getElementById('docTitle').value = entry.docTitle || '사진대지';
  // slotCount 드롭다운 동기화
  const sel = document.getElementById('slotSel');
  if (sel) sel.value = String(slotCount);
  syncSite(entry.siteName||''); syncTitle(entry.docTitle||'사진대지'); syncNavSite(entry.siteName||'');
  sel?.dispatchEvent ? null : null;
  renderAll(); renderSavePanel(); toast(`"${entry.name}" 불러옴`);
}

function deleteSave(idx, e) {
  e.stopPropagation();
  const saves = loadSaves();
  const name = saves[idx]?.name || '';
  saves.splice(idx, 1);
  writeSaves(saves);
  renderSavePanel();
  toast(`"${name}" 삭제됨`);
}

window.addEventListener('resize', () => {
  const sp = document.getElementById('sidepanel');
  const sv = document.getElementById('savePanel');
  if (window.innerWidth > 768) {
    sp.classList.remove('mob-sheet','mob-open');
    sv.classList.remove('mob-sheet','mob-open');
    document.getElementById('mobOverlay').classList.remove('on');
  } else {
    sp.classList.add('mob-sheet');
    sv.classList.add('mob-sheet');
  }
});

document.getElementById('hamburgerBtn').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('mobileDrawer').classList.toggle('open');
});

</script>
<!-- 모바일 오버레이 -->
<div class="mob-overlay" id="mobOverlay" onclick="closeMobSheets()"></div>

<!-- 모바일 하단 액션 바 -->
<div class="mob-bar">
  <button class="mob-bar-btn" onclick="mobToggleSheet('sidepanel')" id="mobPhotoBtn">
    <span class="mbi">📸</span>사진추가
  </button>
  <button class="mob-bar-btn" onclick="mobToggleFmt()" id="mobFmtBtn">
    <span class="mbi">✏️</span>서식
  </button>
  <button class="mob-bar-btn" onclick="mobToggleSettings()" id="mobSetBtn">
    <span class="mbi">⚙️</span>설정
  </button>
  <button class="mob-bar-btn" onclick="mobToggleSheet('savepanel')" id="mobSaveBtn">
    <span class="mbi">📁</span>저장목록
  </button>
  <button class="mob-bar-btn primary" onclick="printPDF()">
    <span class="mbi">🖨️</span>PDF
  </button>
</div>

</body>
</html>
